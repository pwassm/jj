<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mlynx</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { overflow: hidden; height: 100vh; }

/* Canvas fills window, light blue so grid is obvious */
#gameCanvas {
  display: block;
  width: 100vw;
  height: 100vh;
  background: #c8ddf0;
}

/* Simple hamburger */
#menuBtn {
  position: fixed;
  top: 10px;
  right: 10px;
  z-index: 999;
  width: 48px;
  height: 48px;
  background: rgba(30,30,30,0.9);
  border: none;
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px;
}
#menuBtn span {
  display: block;
  width: 100%;
  height: 3px;
  background: #fff;
  border-radius: 2px;
}

/* Tiny popup under hamburger for fit toggle */
#menuPanel {
  position: fixed;
  top: 64px;
  right: 10px;
  z-index: 998;
  background: rgba(25,25,25,0.96);
  border-radius: 10px;
  padding: 10px 14px;
  color: #fff;
  font: 14px Arial, sans-serif;
  display: none;
}
#menuPanel.open { display: block; }

.tog {
  position:relative; display:inline-block; width:38px; height:20px;
}
.tog input { opacity:0; width:0; height:0; }
.tog-slider {
  position:absolute; cursor:pointer; inset:0;
  background:#444; border-radius:20px; transition:.2s;
}
.tog-slider:before {
  content:""; position:absolute; width:14px; height:14px;
  left:3px; bottom:3px; background:#fff; border-radius:50%;
  transition:.2s;
}
.tog input:checked + .tog-slider { background:#3a8a3a; }
.tog input:checked + .tog-slider:before { transform:translateX(18px); }

/* Cell overlays and quick-fill hit areas */
#cellOverlayContainer {
  position: fixed;
  inset: 0;
  pointer-events: none;
}
.cell-overlay {
  position: absolute;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  overflow: hidden;
}
.cell-overlay img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}
.cell-overlay img.fit-contain { object-fit: contain; background: rgba(0,0,0,0.18); }
.cell-overlay img.fit-cover  { object-fit: cover; }

.cell-label {
  position: relative;
  z-index: 1;
  width: 100%;
  text-align: center;
  padding: 2px 4px;
  font-size: 11px;
  font-weight: bold;
  color: #fff;
  background: rgba(0,0,0,0.58);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.cell-overlay.label-only {
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.12);
}
.cell-overlay.label-only .cell-label {
  background: rgba(0,0,80,0.55);
  border-radius: 4px;
  padding: 3px 6px;
  width: auto;
  font-size: 12px;
}

.cell-empty-hit {
  position: absolute;
  box-sizing: border-box;
  border: 2px dashed rgba(100,180,255,0.0);
  transition: border-color .15s, background .15s;
  cursor: crosshair;
}
.cell-empty-hit:hover {
  border-color: rgba(100,180,255,0.6);
  background: rgba(100,180,255,0.07);
}

/* Quick-fill modal */
#qfModal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 2000;
  background: rgba(0,0,0,0.78);
  align-items: center;
  justify-content: center;
}
#qfModal.open { display: flex; }

#qfBox {
  background: #1a1a2e;
  border: 1px solid #555;
  border-radius: 12px;
  padding: 24px 28px;
  min-width: 320px;
  max-width: 520px;
  width: 90vw;
  display: flex;
  flex-direction: column;
  gap: 12px;
  font-family: Arial, sans-serif;
}
#qfBox h3 { color: #8ef; font-size: 15px; }
#qfBox label {
  font-size: 12px; color: #aaa;
  display: block; margin-bottom: 3px;
}
#qfBox input, #qfBox select {
  background: #0a0a1a;
  border: 1px solid #555;
  color: #fff;
  padding: 7px 10px;
  border-radius: 6px;
  font-size: 13px;
  width: 100%;
}
#qfBox input:focus, #qfBox select:focus {
  border-color: #8ef;
  outline: none;
}
#qfCname.has-prev { color: #6af; }
#qfCname.has-prev:focus { color: #fff; }
#qfLinkPreview {
  font-size: 11px; color: #888;
  word-break: break-all; min-height: 14px;
}
.qf-btns {
  display: flex; gap: 8px;
  justify-content: flex-end;
  margin-top: 4px;
}
#qfError { color: #f66; font-size: 12px; min-height: 14px; }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>
<div id="cellOverlayContainer"></div>
<div id="emptyCellHits"></div>

<button id="menuBtn"><span></span><span></span><span></span></button>
<div id="menuPanel">
  <div id="menuDateStamp"></div>
  <div style="margin-top:6px;margin-bottom:6px;font:13px Arial;color:#ccc;">
    Image fit mode:
  </div>
  <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;">
    <span id="miImgFitLabel" style="font:13px Arial;">Img: Fill Cell</span>
    <label class="tog">
      <input type="checkbox" id="togImgFit">
      <span class="tog-slider"></span>
    </label>
  </div>
</div>

<!-- Quick-fill modal -->
<div id="qfModal">
  <div id="qfBox">
    <h3 id="qfTitle">📌 Fill Cell</h3>
    <div>
      <label>Image link</label>
      <input type="text" id="qfLink">
      <div id="qfLinkPreview"></div>
    </div>
    <div>
      <label>Common name (cname)</label>
      <input type="text" id="qfCname">
    </div>
    <div>
      <label>Scientific name</label>
      <input type="text" id="qfSname">
    </div>
    <div>
      <label>Comment</label>
      <input type="text" id="qfComment">
    </div>
    <div>
      <label>Asset</label>
      <select id="qfAsset">
        <option value="i">i — image</option>
        <option value="v">v — video</option>
      </select>
    </div>
    <div>
      <label>Fit override</label>
      <select id="qfFit">
        <option value="">— default —</option>
        <option value="ei">ei — entire image</option>
        <option value="fc">fc — fill cell</option>
      </select>
    </div>
    <div id="qfError"></div>
    <div class="qf-btns">
      <button id="qfCancelBtn">Cancel</button>
      <button id="qfSaveBtn">Save</button>
    </div>
  </div>
</div>

<script>
'use strict';

const GRID_COLS = 7, GRID_ROWS = 7;
const COL_LETTERS = "abcdefg";
let GW=0, GH=0, cellW=0, cellH=0;
let showCellLabels = true;

let imgFitMode = localStorage.getItem("imgFitMode") || "fc";
let linksData = [];

const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

function parseCell(s){
  if(!s || s.length<2) return null;
  const r = parseInt(s[0]);
  const c = COL_LETTERS.indexOf(s[1].toLowerCase())+1;
  if(isNaN(r)||r<1||r>GRID_ROWS||c<1||c>GRID_COLS) return null;
  return {row:r,col:c};
}
function makeCellStr(r,c){ return r + COL_LETTERS[c-1]; }
function occupiedCells(){
  const s = new Set();
  linksData.forEach(it=>{
    if(it.show==="1"){
      const p=parseCell(it.cell);
      if(p) s.add(makeCellStr(p.row,p.col));
    }
  });
  return s;
}

function setup(){
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  GW = canvas.width;
  GH = canvas.height;
  cellW = GW/GRID_COLS;
  cellH = GH/GRID_ROWS;
}

function renderGrid(){
  if(!GW||!GH) return;

  // background
  ctx.fillStyle = '#c8ddf0';
  ctx.fillRect(0,0,GW,GH);

  // grid lines
  ctx.strokeStyle = '#002b55';
  ctx.lineWidth   = 2;
  for(let i=1;i<GRID_COLS;i++){
    const x = Math.round(GW*i/GRID_COLS)+0.5;
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,GH); ctx.stroke();
  }
  for(let i=1;i<GRID_ROWS;i++){
    const y = Math.round(GH*i/GRID_ROWS)+0.5;
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(GW,y); ctx.stroke();
  }

  // labels
  if(showCellLabels){
    const fs = Math.max(12,Math.floor(Math.min(cellW,cellH)*0.25));
    ctx.font = `bold ${fs}px Arial`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    for(let r=1;r<=GRID_ROWS;r++)for(let c=1;c<=GRID_COLS;c++){
      const cx = (c-0.5)*cellW, cy=(r-0.5)*cellH;
      const label = r + COL_LETTERS[c-1];
      ctx.fillStyle="rgba(0,0,0,0.4)"; ctx.fillText(label,cx+1,cy+1);
      ctx.fillStyle="#ffffff";         ctx.fillText(label,cx,cy);
    }
    ctx.textAlign="left"; ctx.textBaseline="alphabetic";
  }

  updateCellOverlays();
  updateEmptyHits();
}

function updateCellOverlays(){
  const cont = document.getElementById("cellOverlayContainer");
  cont.innerHTML="";
  cont.style.width = GW+"px";
  cont.style.height= GH+"px";

  linksData.forEach(it=>{
    if(it.show!=="1") return;
    const pos = parseCell(it.cell);
    if(!pos) return;
    const x=(pos.col-1)*cellW, y=(pos.row-1)*cellH;

    const div=document.createElement("div");
    div.className="cell-overlay";
    div.style.left=x+"px";
    div.style.top =y+"px";
    div.style.width =cellW+"px";
    div.style.height=cellH+"px";

    const hasImg = it.asset==="i" && it.link;
    if(hasImg){
      const img=document.createElement("img");
      img.src = it.link;
      img.alt = it.cname || "";
      const fit = it.fit || imgFitMode;
      img.className = (fit==="ei") ? "fit-contain" : "fit-cover";
      div.appendChild(img);
    } else if(!it.cname){
      return;
    }
    if(!hasImg) div.classList.add("label-only");
    if(it.cname){
      const lbl=document.createElement("div");
      lbl.className="cell-label";
      lbl.textContent=it.cname;
      div.appendChild(lbl);
    }
    cont.appendChild(div);
  });
}

function updateEmptyHits(){
  const hits=document.getElementById("emptyCellHits");
  hits.innerHTML="";
  hits.style.width = GW+"px";
  hits.style.height= GH+"px";
  const occ=occupiedCells();
  for(let r=1;r<=GRID_ROWS;r++)for(let c=1;c<=GRID_COLS;c++){
    const cs=makeCellStr(r,c);
    if(occ.has(cs)) continue;
    const div=document.createElement("div");
    div.className="cell-empty-hit";
    div.style.left =(c-1)*cellW+"px";
    div.style.top  =(r-1)*cellH+"px";
    div.style.width =cellW+"px";
    div.style.height=cellH+"px";
    div.title = "Click to add to "+cs;
    div.addEventListener("click",()=>openQF(cs));
    hits.appendChild(div);
  }
}

// menu + fit toggle
const menuBtn = document.getElementById("menuBtn");
const menuPanel = document.getElementById("menuPanel");
function closeMenu(){ menuPanel.classList.remove("open"); }
menuBtn.addEventListener("click", e=>{
  e.stopPropagation();
  menuPanel.classList.toggle("open");
});
document.addEventListener("click", ()=>{
  if(menuPanel.classList.contains("open")) closeMenu();
});
function syncFitToggle(){
  const chk=document.getElementById("togImgFit");
  chk.checked = (imgFitMode==="ei");
  document.getElementById("miImgFitLabel").textContent =
    imgFitMode==="ei" ? "Img: Entire Image" : "Img: Fill Cell";
}
document.getElementById("togImgFit").addEventListener("change",function(){
  imgFitMode = this.checked ? "ei" : "fc";
  localStorage.setItem("imgFitMode",imgFitMode);
  syncFitToggle();
  renderGrid();
});

// quick-fill
let qfTargetCell="";
async function openQF(cs){
  qfTargetCell=cs;
  const existing = linksData.find(it=>it.cell===cs);
  let clip="";
  try{ clip = (await navigator.clipboard.readText()).trim(); }catch(e){}
  const isUrl = /^https?:\/\//i.test(clip);
  const linkVal = isUrl ? clip : (existing ? (existing.link||"") : "");
  document.getElementById("qfLink").value = linkVal;
  document.getElementById("qfLinkPreview").textContent = linkVal || "";

  const cnameEl = document.getElementById("qfCname");
  const prev = existing ? (existing.cname||"") : "";
  cnameEl.value = prev;
  if(prev){
    cnameEl.classList.add("has-prev");
    cnameEl.addEventListener("input", function h(){
      cnameEl.classList.remove("has-prev");
      cnameEl.removeEventListener("input",h);
    }, {once:true});
  } else cnameEl.classList.remove("has-prev");

  document.getElementById("qfSname").value   = existing ? (existing.sname||"")   : "";
  document.getElementById("qfComment").value = existing ? (existing.comment||"") : "";
  document.getElementById("qfAsset").value   = existing ? existing.asset || "i"  : "i";
  document.getElementById("qfFit").value     = existing ? (existing.fit||"")     : "";

  document.getElementById("qfTitle").textContent = "📌 Fill Cell — "+cs;
  document.getElementById("qfError").textContent = "";
  document.getElementById("qfModal").classList.add("open");
  setTimeout(()=>document.getElementById(linkVal?"qfCname":"qfLink").focus(),50);
}
function qfSave(){
  const link  = document.getElementById("qfLink").value.trim();
  const cname = document.getElementById("qfCname").value.trim();
  if(!link && !cname){
    document.getElementById("qfError").textContent="Need link or cname";
    return;
  }
  const sname   = document.getElementById("qfSname").value.trim();
  const comment = document.getElementById("qfComment").value.trim();
  const asset   = document.getElementById("qfAsset").value;
  const fit     = document.getElementById("qfFit").value;

  let e = linksData.find(it=>it.cell===qfTargetCell);
  if(e){
    e.show="1"; e.asset=asset; e.fit=fit;
    e.link=link; e.cname=cname; e.sname=sname; e.comment=comment;
  } else {
    linksData.push({show:"1",asset,cell:qfTargetCell,fit,link,cname,sname,comment});
  }
  document.getElementById("qfModal").classList.remove("open");
  renderGrid();
}
document.getElementById("qfSaveBtn").addEventListener("click", qfSave);
document.getElementById("qfCancelBtn").addEventListener("click", ()=>{
  document.getElementById("qfModal").classList.remove("open");
});
document.getElementById("qfLink").addEventListener("input",function(){
  document.getElementById("qfLinkPreview").textContent=this.value||"";
});

// keyboard: Ctrl-L toggles labels
document.addEventListener("keydown",e=>{
  if((e.ctrlKey||e.metaKey) && e.key==="l"){
    e.preventDefault();
    showCellLabels=!showCellLabels;
    renderGrid();
  }
});

// date stamp in menu
(function(){
  const d = new Date();
  const ds = d.toLocaleDateString(undefined,
            {weekday:"short",month:"short",day:"numeric",year:"numeric"})+
            " "+d.toLocaleTimeString(undefined,{hour:"2-digit",minute:"2-digit"});
  const el = document.getElementById("menuDateStamp");
  if(el) el.textContent = ds;
})();

// bootstrap
async function init(){
  setup();
  syncFitToggle();
  try{
    const resp = await fetch("links.json");
    const data = await resp.json();
    linksData = Array.isArray(data) ? data : [];
  }catch(e){
    linksData = [];
  }
  renderGrid();
}
init();
window.addEventListener("resize", ()=>{setup();renderGrid();});
</script>
</body>
</html>
