<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mlynx</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { overflow: hidden; height: 100vh; background: #000; }

#gameCanvas { display: block; background: #c8ddf0; }

/* Hamburger — fixed to lower-right corner (cell 7g area) */
#menuWrap {
  position: fixed;
  bottom: 10px;
  right: 10px;
  z-index: 999;
  width: 48px;
  height: 48px;
}
#menuBtn {
  position: absolute;
  inset: 0;
  background: rgba(30,30,30,0.9);
  border: none;
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px;
}
#menuBtn span { display: block; width: 100%; height: 3px; background: #fff; border-radius: 2px; }

/* Menu panel opens upward from button */
#menuPanel {
  position: fixed;
  bottom: 64px;
  right: 10px;
  z-index: 998;
  background: rgba(25,25,25,0.97);
  border-radius: 10px;
  min-width: 210px;
  display: none;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
}
#menuPanel.open { display: flex; }

#menuDateStamp {
  padding: 6px 12px 4px;
  font: 10px Arial, sans-serif;
  color: rgba(255,255,255,0.4);
  text-align: right;
  user-select: none;
}
.menu-item {
  padding: 13px 18px;
  color: #fff;
  font: 15px Arial, sans-serif;
  cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  white-space: nowrap;
}
.menu-item:last-child { border-bottom: none; }
.menu-item:hover { background: rgba(255,255,255,0.12); }
.menu-divider { height: 1px; background: rgba(255,255,255,0.15); }

/* ---- Toggle switch ---- */
.tog { position:relative; display:inline-block; width:38px; height:20px; flex-shrink:0; }
.tog input { opacity:0; width:0; height:0; }
.tog-slider { position:absolute; cursor:pointer; inset:0; background:#444; border-radius:20px; transition:.2s; }
.tog-slider:before { content:""; position:absolute; width:14px; height:14px; left:3px; bottom:3px; background:#fff; border-radius:50%; transition:.2s; }
.tog input:checked + .tog-slider { background:#3a8a3a; }
.tog input:checked + .tog-slider:before { transform:translateX(18px); }

/* ---- Settings sub-panel ---- */
#settingsPanel {
  display: none;
  flex-direction: column;
  background: rgba(15,15,30,0.98);
  border-top: 1px solid rgba(255,255,255,0.12);
}
#settingsPanel.open { display: flex; }
.setting-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 18px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.setting-row span { color: #ccc; font: 13px Arial, sans-serif; }

/* ---- Cell overlays ---- */
#cellOverlayContainer { position: fixed; inset: 0; pointer-events: none; }
.cell-overlay {
  position: absolute;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  overflow: hidden;
}
.cell-overlay img { position: absolute; inset: 0; width: 100%; height: 100%; }
.cell-overlay img.fit-contain { object-fit: contain; background: rgba(0,0,0,0.18); }
.cell-overlay img.fit-cover   { object-fit: cover; }
.cell-label {
  position: relative; z-index: 1; width: 100%; text-align: center;
  padding: 2px 4px; font-size: 11px; font-weight: bold; color: #fff;
  background: rgba(0,0,0,0.58); white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}
.cell-overlay.label-only { align-items: center; justify-content: center; background: rgba(0,0,0,0.12); }
.cell-overlay.label-only .cell-label {
  background: rgba(0,0,80,0.55); border-radius: 4px; padding: 3px 6px; width: auto; font-size: 12px;
}

/* Attribution badge */
.cell-attrib {
  position: absolute; bottom: 18px; right: 2px; z-index: 2;
  font-size: 9px; color: rgba(255,255,255,0.7);
  background: rgba(0,0,0,0.45); padding: 1px 4px; border-radius: 3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 90%;
  text-decoration: none;
}

/* ---- Empty cell hover hit areas ---- */
#emptyCellHits { position: fixed; inset: 0; pointer-events: none; }
.cell-empty-hit {
  position: absolute;
  border: 2px dashed rgba(100,180,255,0.0);
  transition: border-color .15s, background .15s;
  cursor: crosshair;
}
.cell-empty-hit:hover { border-color: rgba(100,180,255,0.6); background: rgba(100,180,255,0.07); }

/* ---- Quick-fill modal ---- */
#qfModal {
  display: none; position: fixed; inset: 0; z-index: 2000;
  background: rgba(0,0,0,0.78); align-items: center; justify-content: center;
}
#qfModal.open { display: flex; }
#qfBox {
  background: #1a1a2e; border: 1px solid #555; border-radius: 12px;
  padding: 24px 28px; min-width: 320px; max-width: 520px; width: 90vw;
  display: flex; flex-direction: column; gap: 12px; font-family: Arial, sans-serif;
}
#qfBox h3 { color: #8ef; font-size: 15px; }
#qfBox label { font-size: 12px; color: #aaa; display: block; margin-bottom: 3px; }
#qfBox input, #qfBox select {
  background: #0a0a1a; border: 1px solid #555; color: #fff;
  padding: 7px 10px; border-radius: 6px; font-size: 13px; width: 100%;
}
#qfBox input:focus, #qfBox select:focus { border-color: #8ef; outline: none; }
#qfCname.has-prev { color: #6af; }
#qfCname.has-prev:focus { color: #fff; }
#qfLinkPreview { font-size: 11px; color: #888; word-break: break-all; min-height: 14px; }
.qf-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
#qfError { color: #f66; font-size: 12px; min-height: 14px; }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>
<div id="cellOverlayContainer"></div>
<div id="emptyCellHits"></div>

<div id="menuWrap">
  <div id="menuPanel">
    <div id="menuDateStamp"></div>
    <div class="menu-item" id="miTables">Tables</div>
    <div class="menu-divider"></div>
    <div class="menu-item" id="miSettings">Settings ▸</div>
    <div id="settingsPanel">
      <div class="setting-row">
        <span id="miImgFitLabel">Img: Fill Cell</span>
        <label class="tog"><input type="checkbox" id="togImgFit"><span class="tog-slider"></span></label>
      </div>
      <div class="setting-row">
        <span>Cell Labels</span>
        <label class="tog"><input type="checkbox" id="togLabels" checked><span class="tog-slider"></span></label>
      </div>
    </div>
    <div class="menu-divider"></div>
    <div class="menu-item" id="miHelp">Help</div>
  </div>
  <button id="menuBtn"><span></span><span></span><span></span></button>
</div>

<!-- Quick-fill modal -->
<div id="qfModal">
  <div id="qfBox">
    <h3 id="qfTitle">📌 Fill Cell</h3>
    <div><label>Image link</label><input type="text" id="qfLink"><div id="qfLinkPreview"></div></div>
    <div><label>Common name (cname)</label><input type="text" id="qfCname"></div>
    <div><label>Scientific name</label><input type="text" id="qfSname"></div>
    <div><label>Attribution</label><input type="text" id="qfAttrib" placeholder="e.g. © Author / CC BY 4.0"></div>
    <div><label>Comment</label><input type="text" id="qfComment"></div>
    <div><label>Asset</label>
      <select id="qfAsset"><option value="i">i — image</option><option value="v">v — video</option></select>
    </div>
    <div><label>Fit override</label>
      <select id="qfFit">
        <option value="">— default —</option>
        <option value="ei">ei — entire image</option>
        <option value="fc">fc — fill cell</option>
      </select>
    </div>
    <div id="qfError"></div>
    <div class="qf-btns">
      <button id="qfCancelBtn">Cancel</button>
      <button id="qfSaveBtn">Save</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ── constants ──────────────────────────────────────────────────────
const GRID_COLS = 7, GRID_ROWS = 7;
const COL_LETTERS = "abcdefg";

// ── state ──────────────────────────────────────────────────────────
let GW=0, GH=0, cellW=0, cellH=0;
let showCellLabels = true;
let imgFitMode = localStorage.getItem("imgFitMode") || "fc";
let linksData  = [];

const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

// ── helpers ────────────────────────────────────────────────────────
function parseCell(s){
  if(!s||s.length<2) return null;
  const r=parseInt(s[0]);
  const c=COL_LETTERS.indexOf(s[1].toLowerCase())+1;
  if(isNaN(r)||r<1||r>GRID_ROWS||c<1||c>GRID_COLS) return null;
  return {row:r,col:c};
}
function makeCellStr(r,c){ return r+COL_LETTERS[c-1]; }
function occupiedCells(){
  const s=new Set();
  linksData.forEach(it=>{ if(it.show==="1"){const p=parseCell(it.cell);if(p)s.add(makeCellStr(p.row,p.col));} });
  return s;
}

// ── layout ─────────────────────────────────────────────────────────
// Force landscape on mobile via CSS transform, similar to original paste.txt approach
function setup(){
  const pw = window.innerWidth  || 800;
  const ph = window.innerHeight || 600;
  const isPortrait = pw < ph;

  if(isPortrait){
    // rotate canvas 90deg so phone is always landscape
    GW = ph; GH = pw;
    canvas.width  = GW;
    canvas.height = GH;
    canvas.style.position = "fixed";
    canvas.style.top    = "0";
    canvas.style.left   = "0";
    canvas.style.width  = GW+"px";
    canvas.style.height = GH+"px";
    canvas.style.transformOrigin = "0 0";
    canvas.style.transform = `rotate(90deg) translateY(-${pw}px)`;
  } else {
    GW = pw; GH = ph;
    canvas.width  = GW;
    canvas.height = GH;
    canvas.style.position = "fixed";
    canvas.style.top    = "0";
    canvas.style.left   = "0";
    canvas.style.width  = GW+"px";
    canvas.style.height = GH+"px";
    canvas.style.transformOrigin = "0 0";
    canvas.style.transform = "none";
  }
  cellW = GW/GRID_COLS;
  cellH = GH/GRID_ROWS;
}

// ── render ─────────────────────────────────────────────────────────
function renderGrid(){
  if(!GW||!GH) return;

  ctx.fillStyle = '#c8ddf0';
  ctx.fillRect(0,0,GW,GH);

  ctx.strokeStyle = '#002b55';
  ctx.lineWidth   = 2;
  for(let i=1;i<GRID_COLS;i++){
    const x=Math.round(GW*i/GRID_COLS)+0.5;
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,GH); ctx.stroke();
  }
  for(let i=1;i<GRID_ROWS;i++){
    const y=Math.round(GH*i/GRID_ROWS)+0.5;
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(GW,y); ctx.stroke();
  }

  if(showCellLabels){
    const fs=Math.max(12,Math.floor(Math.min(cellW,cellH)*0.25));
    ctx.font=`bold ${fs}px Arial`;
    ctx.textAlign="center"; ctx.textBaseline="middle";
    for(let r=1;r<=GRID_ROWS;r++) for(let c=1;c<=GRID_COLS;c++){
      const cx=(c-0.5)*cellW, cy=(r-0.5)*cellH;
      const label=r+COL_LETTERS[c-1];
      ctx.fillStyle="rgba(0,0,0,0.4)"; ctx.fillText(label,cx+1,cy+1);
      ctx.fillStyle="#ffffff";         ctx.fillText(label,cx,cy);
    }
    ctx.textAlign="left"; ctx.textBaseline="alphabetic";
  }

  updateCellOverlays();
  updateEmptyHits();
}

// ── overlays ───────────────────────────────────────────────────────
function updateCellOverlays(){
  const cont=document.getElementById("cellOverlayContainer");
  cont.innerHTML="";
  cont.style.width=GW+"px"; cont.style.height=GH+"px";

  // mirror canvas transform so overlays line up
  const pw=window.innerWidth||800, ph=window.innerHeight||600;
  if(pw<ph){
    cont.style.transformOrigin="0 0";
    cont.style.transform=`rotate(90deg) translateY(-${pw}px)`;
  } else {
    cont.style.transform="none";
  }

  linksData.forEach(it=>{
    if(it.show!=="1") return;
    const pos=parseCell(it.cell); if(!pos) return;
    const x=(pos.col-1)*cellW, y=(pos.row-1)*cellH;

    const div=document.createElement("div");
    div.className="cell-overlay";
    div.style.cssText=`left:${x}px;top:${y}px;width:${cellW}px;height:${cellH}px;`;

    const hasImg = it.asset==="i" && it.link;
    if(hasImg){
      const img=document.createElement("img");
      img.src=it.link; img.alt=it.cname||"";
      const fit=it.fit||imgFitMode;
      img.className=(fit==="ei")?"fit-contain":"fit-cover";
      div.appendChild(img);
    } else if(!it.cname){ return; }

    if(!hasImg) div.classList.add("label-only");
    if(it.cname){
      const lbl=document.createElement("div");
      lbl.className="cell-label"; lbl.textContent=it.cname;
      div.appendChild(lbl);
    }
    // attribution
    if(it.attribution){
      const att=document.createElement("span");
      att.className="cell-attrib"; att.textContent=it.attribution;
      div.appendChild(att);
    }
    cont.appendChild(div);
  });
}

function updateEmptyHits(){
  const hits=document.getElementById("emptyCellHits");
  hits.innerHTML="";
  hits.style.width=GW+"px"; hits.style.height=GH+"px";

  const pw=window.innerWidth||800, ph=window.innerHeight||600;
  if(pw<ph){
    hits.style.transformOrigin="0 0";
    hits.style.transform=`rotate(90deg) translateY(-${pw}px)`;
  } else {
    hits.style.transform="none";
  }

  const occ=occupiedCells();
  for(let r=1;r<=GRID_ROWS;r++) for(let c=1;c<=GRID_COLS;c++){
    const cs=makeCellStr(r,c); if(occ.has(cs)) continue;
    const div=document.createElement("div");
    div.className="cell-empty-hit";
    div.style.cssText=`left:${(c-1)*cellW}px;top:${(r-1)*cellH}px;width:${cellW}px;height:${cellH}px;`;
    div.title="Click to add — "+cs;
    div.addEventListener("click",()=>openQF(cs));
    hits.appendChild(div);
  }
}

// ── menu ───────────────────────────────────────────────────────────
const menuBtn   = document.getElementById("menuBtn");
const menuPanel = document.getElementById("menuPanel");

function closeMenu(){
  menuPanel.classList.remove("open");
  document.getElementById("settingsPanel").classList.remove("open");
  document.getElementById("miSettings").textContent="Settings ▸";
}
menuBtn.addEventListener("click",e=>{
  e.stopPropagation();
  menuPanel.classList.toggle("open");
  if(!menuPanel.classList.contains("open")) closeMenu();
});
document.addEventListener("click",()=>{ if(menuPanel.classList.contains("open")) closeMenu(); });
menuPanel.addEventListener("click",e=>e.stopPropagation());

document.getElementById("miTables").addEventListener("click",e=>{
  e.stopPropagation(); closeMenu(); alert("Tables admin — coming next build");
});
document.getElementById("miHelp").addEventListener("click",e=>{
  e.stopPropagation(); closeMenu();
  alert("Mlynx help\n\nCtrl-L — toggle cell labels\nClick empty cell — quick-fill\nHamburger > Settings — fit mode & labels toggle");
});
document.getElementById("miSettings").addEventListener("click",e=>{
  e.stopPropagation();
  const sp=document.getElementById("settingsPanel");
  const open=sp.classList.toggle("open");
  e.currentTarget.textContent=open?"Settings ▾":"Settings ▸";
});

// fit toggle
function syncFitToggle(){
  const chk=document.getElementById("togImgFit");
  chk.checked=(imgFitMode==="ei");
  document.getElementById("miImgFitLabel").textContent=
    imgFitMode==="ei"?"Img: Entire Image":"Img: Fill Cell";
}
document.getElementById("togImgFit").addEventListener("change",function(){
  imgFitMode=this.checked?"ei":"fc";
  localStorage.setItem("imgFitMode",imgFitMode);
  syncFitToggle(); renderGrid();
});

// labels toggle
document.getElementById("togLabels").addEventListener("change",function(){
  showCellLabels=this.checked; renderGrid();
});

// keyboard Ctrl-L
document.addEventListener("keydown",e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==="l"){
    e.preventDefault();
    showCellLabels=!showCellLabels;
    document.getElementById("togLabels").checked=showCellLabels;
    renderGrid();
  }
});

// date stamp
(()=>{
  const d=new Date();
  const el=document.getElementById("menuDateStamp");
  if(el) el.textContent=d.toLocaleDateString(undefined,
    {weekday:"short",month:"short",day:"numeric",year:"numeric"})
    +" "+d.toLocaleTimeString(undefined,{hour:"2-digit",minute:"2-digit"});
})();

// ── quick-fill ─────────────────────────────────────────────────────
let qfTargetCell="";
async function openQF(cs){
  qfTargetCell=cs;
  const ex=linksData.find(it=>it.cell===cs);
  let clip=""; try{ clip=(await navigator.clipboard.readText()).trim(); }catch(e){}
  const isUrl=/^https?:\/\//i.test(clip);
  const linkVal=isUrl?clip:(ex?(ex.link||""):"");
  document.getElementById("qfLink").value=linkVal;
  document.getElementById("qfLinkPreview").textContent=linkVal||"";

  const cnameEl=document.getElementById("qfCname");
  const prev=ex?(ex.cname||""):""; cnameEl.value=prev;
  if(prev){
    cnameEl.classList.add("has-prev");
    cnameEl.addEventListener("input",function h(){ cnameEl.classList.remove("has-prev"); cnameEl.removeEventListener("input",h); },{once:true});
  } else cnameEl.classList.remove("has-prev");

  document.getElementById("qfSname").value   = ex?(ex.sname||""):"";
  document.getElementById("qfAttrib").value  = ex?(ex.attribution||""):"";
  document.getElementById("qfComment").value = ex?(ex.comment||""):"";
  document.getElementById("qfAsset").value   = ex?(ex.asset||"i"):"i";
  document.getElementById("qfFit").value     = ex?(ex.fit||""):"";
  document.getElementById("qfTitle").textContent="📌 Fill Cell — "+cs;
  document.getElementById("qfError").textContent="";
  document.getElementById("qfModal").classList.add("open");
  setTimeout(()=>document.getElementById(linkVal?"qfCname":"qfLink").focus(),50);
}
function qfSave(){
  const link  =document.getElementById("qfLink").value.trim();
  const cname =document.getElementById("qfCname").value.trim();
  if(!link&&!cname){ document.getElementById("qfError").textContent="Need link or cname"; return; }
  const sname  =document.getElementById("qfSname").value.trim();
  const attrib =document.getElementById("qfAttrib").value.trim();
  const comment=document.getElementById("qfComment").value.trim();
  const asset  =document.getElementById("qfAsset").value;
  const fit    =document.getElementById("qfFit").value;
  let e=linksData.find(it=>it.cell===qfTargetCell);
  if(e){ Object.assign(e,{show:"1",asset,fit,link,cname,sname,attribution:attrib,comment}); }
  else  { linksData.push({show:"1",asset,cell:qfTargetCell,fit,link,cname,sname,attribution:attrib,comment}); }
  document.getElementById("qfModal").classList.remove("open");
  renderGrid();
}
document.getElementById("qfSaveBtn").addEventListener("click",qfSave);
document.getElementById("qfCancelBtn").addEventListener("click",()=>document.getElementById("qfModal").classList.remove("open"));
document.getElementById("qfLink").addEventListener("input",function(){ document.getElementById("qfLinkPreview").textContent=this.value||""; });

// ── bootstrap ──────────────────────────────────────────────────────
async function init(){
  setup();
  syncFitToggle();
  try{
    const resp=await fetch("links.json");
    const data=await resp.json();
    linksData=Array.isArray(data)?data:[];
  }catch(e){ linksData=[]; }
  renderGrid();
}
init();
window.addEventListener("resize",()=>{ setup(); renderGrid(); });
window.addEventListener("orientationchange",()=>setTimeout(()=>{ setup(); renderGrid(); },300));
</script>
</body>
</html>
