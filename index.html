<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mlynx</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { overflow: hidden; touch-action: manipulation; background: #000; }
#rotateWrap { position: fixed; top: 0; left: 0; }
#gameCanvas  { display: block; }

/* ── Hamburger menu ──────────────────────────────────────────── */
#menuWrap { position: fixed; z-index: 999; width: 48px; height: 48px; }
#menuWrap.portrait-mode { transform: rotate(90deg); transform-origin: 24px 24px; }
#menuBtn {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(30,30,30,0.82); border: none; border-radius: 10px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 6px; padding: 10px; touch-action: manipulation;
}
#menuBtn.open { background: rgba(30,30,30,0.97); }
#menuBtn span { display: block; width: 100%; height: 3px; background: #fff; border-radius: 2px; }
#menuPanel {
    position: absolute; bottom: 54px; right: 0; z-index: 998;
    background: rgba(25,25,25,0.96); border-radius: 10px;
    overflow-y: auto; max-height: 80vh;
    display: none; flex-direction: column; min-width: 200px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.3) transparent;
}
#menuPanel::-webkit-scrollbar { width: 6px; }
#menuPanel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 3px; }
#menuPanel.open { display: flex; }
#menuDateStamp {
    padding: 6px 12px 2px 12px; font: 10px Arial, sans-serif;
    color: rgba(255,255,255,0.35); text-align: right;
    flex-shrink: 0; user-select: none; letter-spacing: 0.3px;
}
.menu-item {
    padding: 13px 18px; color: #fff; font: 15px Arial, sans-serif;
    cursor: pointer; white-space: nowrap;
    border-bottom: 1px solid rgba(255,255,255,0.08); flex-shrink: 0;
}
.menu-item:last-child { border-bottom: none; }
.menu-item:hover, .menu-item:active { background: rgba(255,255,255,0.12); }
.menu-divider { height: 1px; background: rgba(255,255,255,0.15); margin: 2px 0; flex-shrink: 0; }

/* ── Media Manager overlay ───────────────────────────────────── */
#vmOverlay {
    display: none; position: fixed; inset: 0; z-index: 2000;
    background: rgba(0,0,0,0.88); flex-direction: column;
    font-family: Arial, sans-serif; color: #fff;
}
#vmOverlay.open { display: flex; }
#vmHeader {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px; background: #1a1a2e; flex-shrink: 0;
    border-bottom: 1px solid #333; flex-wrap: wrap;
}
#vmHeader h2 { font-size: 16px; color: #8ef; margin-right: 6px; }
#vmAdminBadge {
    display: none; padding: 3px 10px; border-radius: 12px;
    background: #3a1a0a; border: 1px solid #f80; color: #fc8;
    font-size: 11px; font-weight: bold;
}
#vmAdminBadge.visible { display: inline-block; }
.vm-tab {
    padding: 5px 14px; border-radius: 6px; cursor: pointer;
    background: #2a2a3e; border: 1px solid #444; font-size: 13px; color: #ccc;
}
.vm-tab.active { background: #3a5a8a; border-color: #8ef; color: #fff; }
.vm-tab:hover  { background: #3a3a5e; }
#vmToolbar {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px; background: #111122; flex-shrink: 0;
    border-bottom: 1px solid #333; flex-wrap: wrap;
}
.vm-btn {
    padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 12px;
    border: 1px solid #555; background: #2a2a3e; color: #ddd; white-space: nowrap;
}
.vm-btn:hover  { background: #3a3a5e; border-color: #8ef; color: #fff; }
.vm-btn.danger { border-color: #f55; color: #f88; }
.vm-btn.danger:hover  { background: #3e1a1a; }
.vm-btn.success { border-color: #5f5; color: #afa; }
.vm-btn.success:hover { background: #1a3e1a; }
.vm-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.vm-btn:disabled:hover { background: #2a2a3e; border-color: #555; color: #ddd; }
#vmSelInfo { margin-left: auto; font-size: 12px; color: #888; white-space: nowrap; }

/* ── Table ───────────────────────────────────────────────────── */
#vmTableWrap {
    flex: 1; overflow: auto;
    scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.3) transparent;
}
#vmTableWrap::-webkit-scrollbar { width: 7px; height: 7px; }
#vmTableWrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.25); border-radius: 4px; }
#vmTable { border-collapse: collapse; width: 100%; font-size: 13px; }
#vmTable th {
    position: sticky; top: 0; background: #1e1e3a; color: #8ef;
    padding: 8px 10px; text-align: left; white-space: nowrap;
    border-bottom: 2px solid #444; user-select: none; z-index: 2;
    overflow: hidden; text-overflow: ellipsis;
}
#vmTable th.sortable { cursor: pointer; }
#vmTable th.sortable:hover { background: #2a2a5a; }
#vmTable th.sort-asc::after  { content: " ▲"; font-size: 10px; }
#vmTable th.sort-desc::after { content: " ▼"; font-size: 10px; }
#vmTable th.no-sort { cursor: default; }
.vm-resize-handle {
    position: absolute; right: 0; top: 0; bottom: 0; width: 6px;
    cursor: col-resize; background: transparent;
    border-right: 2px solid transparent;
}
.vm-resize-handle:hover, .vm-resize-handle.resizing { border-right-color: #8ef; }
#vmTable td {
    padding: 6px 10px; border-bottom: 1px solid #222;
    vertical-align: middle; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
#vmTable tr.vm-row { cursor: pointer; }
#vmTable tr.vm-row:hover td { background: rgba(255,255,255,0.05); }
#vmTable tr.vm-row.selected td { background: rgba(58,90,138,0.55); }
#vmTable td.editable { cursor: text; }
#vmTable td.editable:hover { background: rgba(100,200,255,0.08) !important; outline: 1px dashed #8ef4; }
#vmTable td.locked { cursor: default; color: #666; }
#vmTable td.locked:hover { background: none !important; outline: none !important; }
#vmTable input.vm-cell-input {
    background: #0a0a1a; border: 1px solid #8ef; color: #fff;
    padding: 2px 5px; border-radius: 3px; font-size: 13px; width: 100%; min-width: 40px;
}

/* ── Field chips panel ────────────────────────────────────────── */
#vmFieldPanel {
    display: none; padding: 14px 18px; background: #111122;
    border-top: 1px solid #333; flex-shrink: 0; flex-wrap: wrap; gap: 8px;
}
#vmFieldPanel.open { display: flex; align-items: flex-start; }
#vmFieldPanel h3 { width: 100%; font-size: 14px; color: #fc8; margin-bottom: 4px; }
.vm-field-chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px; border-radius: 20px; font-size: 12px;
    border: 1px solid #555; background: #2a2a3e; color: #ddd;
    cursor: grab; user-select: none; position: relative;
}
.vm-field-chip.active-field { border-color: #5f5; color: #afa; background: #1a3a1a; }
.vm-field-chip .chip-toggle  { cursor: pointer; font-size: 14px; }
.vm-field-chip.dragging      { opacity: 0.4; }
.vm-field-chip.drag-over     { border-color: #fc8; background: #3a2a0a; }
.chip-width-input {
    width: 42px; background: #0a0a1a; border: 1px solid #555; color: #ccc;
    padding: 1px 4px; border-radius: 3px; font-size: 11px; text-align: center;
}

/* Backup panel */
#vmBackupPanel {
    display: none; padding: 8px 14px; background: #0e0e1e;
    border-bottom: 1px solid #333; flex-shrink: 0;
    align-items: center; gap: 8px; flex-wrap: wrap;
}
#vmBackupPanel.open { display: flex; }
#vmBackupPanel label { font-size: 12px; color: #fc8; }
#vmBackupList {
    background: #0a0a1a; border: 1px solid #444; color: #fff;
    padding: 3px 8px; border-radius: 5px; font-size: 12px; min-width: 220px;
}

/* Admin login modal */
#vmLoginModal {
    display: none; position: fixed; inset: 0; z-index: 3000;
    background: rgba(0,0,0,0.75); align-items: center; justify-content: center;
}
#vmLoginModal.open { display: flex; }
#vmLoginBox {
    background: #1a1a2e; border: 1px solid #555; border-radius: 12px;
    padding: 28px 32px; min-width: 280px; display: flex; flex-direction: column; gap: 14px;
}
#vmLoginBox h3 { color: #8ef; font-size: 15px; }
#vmLoginBox p  { color: #888; font-size: 12px; line-height: 1.5; }
.vm-login-row { display: flex; flex-direction: column; gap: 4px; }
.vm-login-row label { font-size: 12px; color: #aaa; }
.vm-login-row input {
    background: #0a0a1a; border: 1px solid #555; color: #fff;
    padding: 7px 10px; border-radius: 6px; font-size: 14px;
}
.vm-login-row input:focus { border-color: #8ef; outline: none; }
#vmLoginError { color: #f66; font-size: 12px; min-height: 16px; }
.vm-login-btns { display: flex; gap: 8px; justify-content: flex-end; }

/* Status bar */
#vmStatus {
    padding: 5px 14px; font-size: 11px; color: #888;
    background: #0a0a1a; border-top: 1px solid #222; flex-shrink: 0;
    display: flex; justify-content: space-between;
}
#vmStatus span { color: #afa; }

/* ── Grid cell overlays ──────────────────────────────────────── */
#cellOverlayContainer {
    position: absolute; top: 0; left: 0; pointer-events: none;
}
.cell-overlay {
    position: absolute;
    display: flex; align-items: flex-end; justify-content: center;
    overflow: hidden;
}
.cell-overlay img {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%; object-fit: cover;
}
.cell-label {
    position: relative; z-index: 1;
    width: 100%; text-align: center; padding: 2px 4px;
    font-size: 11px; font-weight: bold; color: #fff;
    background: rgba(0,0,0,0.58); white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
}
/* cell with only label, no image */
.cell-overlay.label-only {
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.18);
}
.cell-overlay.label-only .cell-label {
    background: rgba(0,0,80,0.55); border-radius: 4px; padding: 3px 6px; width: auto; font-size: 12px;
}
</style>
</head>
<body>

<div id="rotateWrap">
    <canvas id="gameCanvas"></canvas>
    <div id="cellOverlayContainer"></div>
</div>

<!-- ── Hamburger menu ──────────────────────────────────────────── -->
<div id="menuWrap">
    <div id="menuPanel">
        <div id="menuDateStamp"></div>
        <div class="menu-item" id="miPlay">Play</div>
        <div class="menu-divider"></div>
        <div class="menu-item" id="miTables">Tables  <span style="font-size:10px;opacity:.5">Ctrl-T</span></div>
        <div class="menu-item" id="miHelp">Help</div>
    </div>
    <button id="menuBtn"><span></span><span></span><span></span></button>
</div>

<!-- ── Links Manager Overlay ───────────────────────────────────── -->
<div id="vmOverlay">
    <div id="vmHeader">
        <h2>📋 Links Manager</h2>
        <span id="vmAdminBadge">⚙ Admin</span>
        <button class="vm-btn" id="vmAdminLoginBtn">🔑 Admin</button>
        <button class="vm-btn danger" id="vmAdminLogoutBtn" style="display:none">🔓 Logout</button>

    </div>

    <div id="vmToolbar">
        <button class="vm-btn success" id="vmExportBtn"      disabled>⬇ Export links.json</button>
        <button class="vm-btn"         id="vmBackupBtn"      disabled>🗂 Backups</button>
        <button class="vm-btn danger"  id="vmResetBtn"       disabled>↺ Reset</button>
        <button class="vm-btn"         id="vmFieldToggleBtn" disabled>⚙ Columns</button>
        <button class="vm-btn success" id="vmAddRowBtn"      disabled>＋ Add Row</button>
        <button class="vm-btn danger"  id="vmDelRowBtn"      disabled>🗑 Delete Selected</button>
        <div id="vmSelInfo">0 selected</div>
    </div>

    <!-- Backup panel -->
    <div id="vmBackupPanel">
        <label>Backup:</label>
        <select id="vmBackupList"></select>
        <button class="vm-btn success" id="vmBackupSaveBtn">💾 Save backup</button>
        <button class="vm-btn"         id="vmBackupRestoreBtn">⬆ Restore</button>
        <button class="vm-btn danger"  id="vmBackupDeleteBtn">🗑 Delete</button>
    </div>

    <!-- Field chips panel -->
    <div id="vmFieldPanel">
        <h3>Columns — drag to reorder · ●/○ show/hide</h3>

    <div id="vmTableWrap">
        <table id="vmTable">
            <thead><tr id="vmThead"></tr></thead>
            <tbody id="vmTbody"></tbody>
        </table>
    </div>
    <div id="vmStatus">
        <div id="vmStatusLeft">No data loaded</div>
        <div id="vmStatusRight">localStorage: <span id="vmLsInfo">—</span></div>
    </div>
</div>

<!-- ── Admin Login Modal ─────────────────────────────────────────── -->
<div id="vmLoginModal">
    <div id="vmLoginBox">
        <h3>🔑 Admin Sign In</h3>
        <p>Admin access allows editing the links table and exporting links.json.</p>
        <div class="vm-login-row">
            <label>Password</label>
            <input type="password" id="vmLoginPwd" placeholder="Enter admin password" autocomplete="current-password">
        </div>
        <div id="vmLoginError"></div>
        <div class="vm-login-btns">
            <button class="vm-btn" id="vmLoginCancelBtn">Cancel</button>
            <button class="vm-btn success" id="vmLoginSubmitBtn">Sign In</button>
        </div>
    </div>
</div>

<script>
'use strict';

// ── Date stamp ──────────────────────────────────────────────────────
(function(){
    const d = new Date();
    document.getElementById("menuDateStamp").textContent =
        d.toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric",year:"numeric"})
        + " " + d.toLocaleTimeString(undefined,{hour:"2-digit",minute:"2-digit"});
})();

// ── Grid constants ──────────────────────────────────────────────────
const GRID_COLS = 7, GRID_ROWS = 7;
const COL_LETTERS = "abcdefg";   // col 1=a … col 7=g

// SHA-256("asdfjj")
const ADMIN_HASH = "5bfb1d6e44d32e5f6d8193ae736f0f82964917d006db917a97ce2c4e83956958";

// ── Layout globals ──────────────────────────────────────────────────
let GW, GH, cellW, cellH, isPortrait, bgColor;
let showCellLabels = false;
const canvas    = document.getElementById("gameCanvas");
const ctx       = canvas.getContext("2d");
const wrap      = document.getElementById("rotateWrap");
const menuWrap  = document.getElementById("menuWrap");
const menuBtn   = document.getElementById("menuBtn");
const menuPanel = document.getElementById("menuPanel");

// ── links data ──────────────────────────────────────────────────────
// Each entry: { show, asset, cell, link, cname, sname, comment }
//   show:  "1" | "0"
//   asset: "i" (image) | "v" (video)
//   cell:  e.g. "1a" … "7g"  — row digit + col letter
//   link, cname, sname, comment: strings
let linksData = [];

// ── Cell address helpers ────────────────────────────────────────────
// Parse "2c" → {row:2, col:3}  (col: a=1…g=7)
function parseCell(cellStr) {
    if (!cellStr || cellStr.length < 2) return null;
    const row = parseInt(cellStr[0]);
    const col = COL_LETTERS.indexOf(cellStr[1].toLowerCase()) + 1;
    if (isNaN(row) || row < 1 || row > GRID_ROWS || col < 1 || col > GRID_COLS) return null;
    return {row, col};
}

// ── Cell overlay rendering ──────────────────────────────────────────
function updateCellOverlays() {
    const container = document.getElementById("cellOverlayContainer");
    container.innerHTML = "";
    container.style.width  = GW + "px";
    container.style.height = GH + "px";

    linksData.forEach(item => {
        if (item.show !== "1") return;
        const pos = parseCell(item.cell);
        if (!pos) return;

        const x = (pos.col - 1) * cellW;
        const y = (pos.row - 1) * cellH;

        const div = document.createElement("div");
        div.className = "cell-overlay";
        div.style.left   = x + "px";
        div.style.top    = y + "px";
        div.style.width  = cellW + "px";
        div.style.height = cellH + "px";

        const hasImage = item.asset === "i" && item.link;
        if (hasImage) {
            const img = document.createElement("img");
            img.src = item.link;
            img.alt = item.cname || "";
            div.appendChild(img);
        } else if (!item.cname) {
            return; // nothing to show
        }

        if (!hasImage) div.classList.add("label-only");

        if (item.cname) {
            const lbl = document.createElement("div");
            lbl.className   = "cell-label";
            lbl.textContent = item.cname;
            div.appendChild(lbl);
        }
        container.appendChild(div);
    });
}

// ── Grid drawing ────────────────────────────────────────────────────
function drawCellLabels() {
    const fs = Math.max(10, Math.floor(Math.min(cellW, cellH) * 0.22));
    ctx.font = "bold " + fs + "px Arial";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    for (let row = 1; row <= GRID_ROWS; row++) {
        for (let col = 1; col <= GRID_COLS; col++) {
            const cx = (col-0.5)*cellW, cy = (row-0.5)*cellH;
            const label = row + COL_LETTERS[col-1];
            ctx.fillStyle = "rgba(0,0,0,0.35)";    ctx.fillText(label, cx+1, cy+1);
            ctx.fillStyle = "rgba(60,60,180,0.75)"; ctx.fillText(label, cx, cy);
        }
    }
    ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";
}

function renderGrid() {
    ctx.fillStyle = bgColor; ctx.fillRect(0, 0, GW, GH);
    ctx.strokeStyle = "#000"; ctx.lineWidth = 1;
    for (let i = 1; i < GRID_COLS; i++) {
        const x = GW * i / GRID_COLS;
        ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,GH); ctx.stroke();
    }
    for (let i = 1; i < GRID_ROWS; i++) {
        const y = GH * i / GRID_ROWS;
        ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(GW,y); ctx.stroke();
    }
    if (showCellLabels) drawCellLabels();
    updateCellOverlays();
}

function setupLayout() {
    const pw = window.innerWidth, ph = window.innerHeight;
    isPortrait = pw < ph;
    bgColor = Math.min(pw,ph) < 600 ? "#7ab8e8" : "#ffffff";
    if (isPortrait) {
        GW=ph; GH=pw; canvas.width=GW; canvas.height=GH;
        wrap.style.cssText = "width:"+GW+"px;height:"+GH+"px;transform-origin:0 0;transform:rotate(90deg) translateY(-"+pw+"px)";
    } else {
        GW=pw; GH=ph; canvas.width=GW; canvas.height=GH;
        wrap.style.cssText = "width:"+GW+"px;height:"+GH+"px;transform-origin:0 0;transform:none";
    }
    cellW = GW / GRID_COLS; cellH = GH / GRID_ROWS;
    updateMenuPosition();
}

// ── Menu helpers ────────────────────────────────────────────────────
function closeMenu() { menuPanel.classList.remove("open"); menuBtn.classList.remove("open"); }
function updateMenuPosition() {
    const PAD = 14;
    if (isPortrait) {
        menuWrap.classList.add("portrait-mode");
        menuWrap.style.cssText += ";bottom:"+PAD+"px;left:"+PAD+"px;right:auto";
    } else {
        menuWrap.classList.remove("portrait-mode");
        menuWrap.style.cssText += ";bottom:"+PAD+"px;right:"+PAD+"px;left:auto";
    }
}

document.getElementById("miPlay").addEventListener("pointerup",   e=>{ e.stopPropagation(); closeMenu(); alert("Play — TBD"); });
document.getElementById("miTables").addEventListener("pointerup", e=>{ e.stopPropagation(); closeMenu(); vmOpen(); });
document.getElementById("miHelp").addEventListener("pointerup",   e=>{ e.stopPropagation(); closeMenu(); alert("Help — coming soon"); });
menuBtn.addEventListener("pointerup", e=>{ e.stopPropagation(); const o=menuPanel.classList.toggle("open"); menuBtn.classList.toggle("open",o); });
menuPanel.addEventListener("pointerup", e=>e.stopPropagation());
document.addEventListener("pointerup", ()=>{ if(menuPanel.classList.contains("open")) closeMenu(); });

document.addEventListener("keydown", e=>{
    if((e.ctrlKey||e.metaKey)&&e.key==="l"){ e.preventDefault(); showCellLabels=!showCellLabels; renderGrid(); }
    if((e.ctrlKey||e.metaKey)&&e.key==="t"){ e.preventDefault(); vmOpen(); }
});

// ══════════════════════════════════════════════════════════════════════
// LINKS MANAGER
// ══════════════════════════════════════════════════════════════════════
let vmIsAdmin = false;

// Field definitions — order matches JSON field order
const VM_FIELDS = [
    {key:"show",    label:"Show",    editable:"admin", type:"text", defWidth:44,  hint:"1 or 0"},
    {key:"asset",   label:"Asset",   editable:"admin", type:"text", defWidth:44,  hint:"i or v"},
    {key:"cell",    label:"Cell",    editable:"admin", type:"text", defWidth:54,  hint:"e.g. 1a"},
    {key:"link",    label:"Link",    editable:"admin", type:"text", defWidth:260, hint:"URL to asset"},
    {key:"cname",   label:"CName",   editable:"admin", type:"text", defWidth:140, hint:"Common name"},
    {key:"sname",   label:"SName",   editable:"admin", type:"text", defWidth:160, hint:"Scientific name"},
    {key:"comment", label:"Comment", editable:"admin", type:"text", defWidth:220, hint:"Notes"},
];
let vmFieldConfig = VM_FIELDS.map(f=>({key:f.key, visible:true, width:f.defWidth}));

const LS_DATA_KEY = "vmLinksData";
const LS_FC_KEY   = "vmLinksFieldConfig";
const LS_BK_KEY   = "vmLinksBackups";
const VM_MAX_BACKUPS = 10;

let vmSortCol=null, vmSortAsc=true;
let vmSelected=new Set(), vmLastClick=-1;
let vmFieldPanelOpen=false, vmDragKey=null;

function vmSaveLS() {
    try {
        localStorage.setItem(LS_DATA_KEY, JSON.stringify(linksData));
        localStorage.setItem(LS_FC_KEY,   JSON.stringify(vmFieldConfig));
        vmUpdateStatus();
    } catch(e){}
}
function vmLoadLS() {
    try {
        const d=localStorage.getItem(LS_DATA_KEY), fc=localStorage.getItem(LS_FC_KEY);
        if(d)  linksData     = JSON.parse(d);
        if(fc) vmFieldConfig = JSON.parse(fc);
        return !!d;
    } catch(e){ return false; }
}

function vmGetBackups()      { try{ return JSON.parse(localStorage.getItem(LS_BK_KEY))||[]; }catch(e){ return []; } }
function vmSetBackups(list)  { try{ localStorage.setItem(LS_BK_KEY, JSON.stringify(list)); }catch(e){} }

async function vmHashPassword(pwd) {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pwd));
    return [...new Uint8Array(buf)].map(x=>x.toString(16).padStart(2,"0")).join("");
}

// ── Open / close ────────────────────────────────────────────────────
function vmOpen() {
    document.getElementById("vmOverlay").classList.add("open");
    vmRefreshAdminUI(); vmRenderFieldPanel(); vmRenderTable(); vmUpdateStatus();
}
function vmClose() { document.getElementById("vmOverlay").classList.remove("open"); }
document.getElementById("vmCloseBtn").addEventListener("click", vmClose);

// ── Admin login / logout ────────────────────────────────────────────
function vmRefreshAdminUI() {
    document.getElementById("vmAdminBadge").classList.toggle("visible", vmIsAdmin);
    document.getElementById("vmAdminLogoutBtn").style.display = vmIsAdmin?"":"none";
    document.getElementById("vmAdminLoginBtn").style.display  = vmIsAdmin?"none":"";
    ["vmExportBtn","vmBackupBtn","vmResetBtn","vmFieldToggleBtn","vmAddRowBtn","vmDelRowBtn"]
        .forEach(id=>{ document.getElementById(id).disabled=!vmIsAdmin; });
}
document.getElementById("vmAdminLoginBtn").addEventListener("click",()=>{
    document.getElementById("vmLoginModal").classList.add("open");
    document.getElementById("vmLoginPwd").value="";
    document.getElementById("vmLoginError").textContent="";
    setTimeout(()=>document.getElementById("vmLoginPwd").focus(),100);
});
document.getElementById("vmAdminLogoutBtn").addEventListener("click",()=>{ vmIsAdmin=false; vmRefreshAdminUI(); vmRenderTable(); });
document.getElementById("vmLoginCancelBtn").addEventListener("click",()=>{ document.getElementById("vmLoginModal").classList.remove("open"); });
document.getElementById("vmLoginSubmitBtn").addEventListener("click", vmDoLogin);
document.getElementById("vmLoginPwd").addEventListener("keydown",e=>{ if(e.key==="Enter") vmDoLogin(); });
async function vmDoLogin() {
    const pwd=document.getElementById("vmLoginPwd").value;
    if(await vmHashPassword(pwd)===ADMIN_HASH){
        vmIsAdmin=true;
        document.getElementById("vmLoginModal").classList.remove("open");
        vmRefreshAdminUI(); vmRenderTable();
    } else {
        document.getElementById("vmLoginError").textContent="Incorrect password.";
        document.getElementById("vmLoginPwd").select();
    }
}

// ── Status ──────────────────────────────────────────────────────────
function vmUpdateStatus() {
    document.getElementById("vmLsInfo").textContent = localStorage.getItem(LS_DATA_KEY)?"links ✓":"none";
    document.getElementById("vmStatusLeft").textContent = "links.json — "+linksData.length+" entries";
}

// ── Field panel ─────────────────────────────────────────────────────
function vmRenderFieldPanel() {
    const panel=document.getElementById("vmFieldPanel");
    panel.innerHTML="<h3>Columns — drag to reorder · ●/○ show/hide</h3>";
    vmFieldConfig.forEach(fc=>{
        const def=VM_FIELDS.find(f=>f.key===fc.key)||{key:fc.key,label:fc.key};
        const chip=document.createElement("span");
        chip.className="vm-field-chip"+(fc.visible?" active-field":"");
        chip.draggable=true; chip.dataset.key=fc.key;
        const toggle=document.createElement("span");
        toggle.className="chip-toggle"; toggle.textContent=fc.visible?"●":"○";
        toggle.addEventListener("click",e=>{ e.stopPropagation(); fc.visible=!fc.visible; vmSaveLS(); vmRenderFieldPanel(); vmRenderTable(); });
        const lbl=document.createElement("span"); lbl.textContent=" "+def.label;
        chip.appendChild(toggle); chip.appendChild(lbl);
        chip.addEventListener("dragstart",()=>{ vmDragKey=fc.key; chip.classList.add("dragging"); });
        chip.addEventListener("dragend",  ()=>{ chip.classList.remove("dragging"); vmDragKey=null; });
        chip.addEventListener("dragover", e=>{ e.preventDefault(); chip.classList.add("drag-over"); });
        chip.addEventListener("dragleave",()=>chip.classList.remove("drag-over"));
        chip.addEventListener("drop",e=>{
            e.preventDefault(); chip.classList.remove("drag-over");
            if(!vmDragKey||vmDragKey===fc.key) return;
            const fi=vmFieldConfig.findIndex(x=>x.key===vmDragKey), ti=vmFieldConfig.findIndex(x=>x.key===fc.key);
            if(fi<0||ti<0) return;
            const [moved]=vmFieldConfig.splice(fi,1); vmFieldConfig.splice(ti,0,moved);
            vmSaveLS(); vmRenderFieldPanel(); vmRenderTable();
        });
        panel.appendChild(chip);
    });
}
document.getElementById("vmFieldToggleBtn").addEventListener("click",()=>{
    vmFieldPanelOpen=!vmFieldPanelOpen;
    document.getElementById("vmFieldPanel").classList.toggle("open",vmFieldPanelOpen);
});

// ── Export ──────────────────────────────────────────────────────────
document.getElementById("vmExportBtn").addEventListener("click",()=>{
    const blob=new Blob([JSON.stringify(linksData,null,2)],{type:"application/json"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
    a.download="links.json"; a.click(); URL.revokeObjectURL(a.href);
});

// ── Add / Delete rows ───────────────────────────────────────────────
document.getElementById("vmAddRowBtn").addEventListener("click",()=>{
    linksData.push({show:"0",asset:"i",cell:"",link:"",cname:"",sname:"",comment:""});
    vmSaveLS(); vmRenderTable(); vmUpdateStatus();
});
document.getElementById("vmDelRowBtn").addEventListener("click",()=>{
    if(!vmSelected.size) return;
    if(!confirm("Delete "+vmSelected.size+" selected row(s)?")) return;
    [...vmSelected].sort((a,b)=>b-a).forEach(i=>linksData.splice(i,1));
    vmSelected.clear(); vmSaveLS(); vmRenderTable(); vmUpdateStatus(); renderGrid();
});

// ── Backups ─────────────────────────────────────────────────────────
function vmPopulateBackupList(){
    const sel=document.getElementById("vmBackupList"); sel.innerHTML="";
    const list=vmGetBackups();
    if(!list.length){ const o=document.createElement("option"); o.textContent="(no backups yet)"; sel.appendChild(o); }
    else list.forEach((bk,i)=>{ const o=document.createElement("option"); o.value=i; o.textContent=bk.ts; sel.appendChild(o); });
}
function vmSaveBackup(){
    const ts=new Date().toISOString().slice(0,19).replace("T"," ");
    const list=vmGetBackups(); list.unshift({ts,json:JSON.stringify(linksData)});
    if(list.length>VM_MAX_BACKUPS) list.length=VM_MAX_BACKUPS;
    vmSetBackups(list); vmPopulateBackupList(); alert("Backup saved: "+ts);
}
document.getElementById("vmBackupBtn").addEventListener("click",()=>{ const open=document.getElementById("vmBackupPanel").classList.toggle("open"); if(open) vmPopulateBackupList(); });
document.getElementById("vmBackupSaveBtn").addEventListener("click", vmSaveBackup);
document.getElementById("vmBackupRestoreBtn").addEventListener("click",()=>{
    const sel=document.getElementById("vmBackupList"); const idx=parseInt(sel.value); const list=vmGetBackups();
    if(!list[idx]) return;
    if(!confirm("Restore backup from "+list[idx].ts+"?")) return;
    linksData=JSON.parse(list[idx].json); vmSaveLS(); vmRenderTable(); vmUpdateStatus(); renderGrid(); alert("Restored: "+list[idx].ts);
});
document.getElementById("vmBackupDeleteBtn").addEventListener("click",()=>{
    const sel=document.getElementById("vmBackupList"); const idx=parseInt(sel.value); const list=vmGetBackups();
    if(!list[idx]) return;
    if(!confirm("Delete backup: "+list[idx].ts+"?")) return;
    list.splice(idx,1); vmSetBackups(list); vmPopulateBackupList();
});

// ── Reset ────────────────────────────────────────────────────────────
document.getElementById("vmResetBtn").addEventListener("click",()=>{
    if(!confirm("Reset to last-fetched links.json? localStorage cleared.")) return;
    localStorage.removeItem(LS_DATA_KEY); localStorage.removeItem(LS_FC_KEY);
    vmFieldConfig=VM_FIELDS.map(f=>({key:f.key,visible:true,width:f.defWidth}));
    fetch("links.json?v="+Date.now()).then(r=>r.json()).catch(()=>[])
        .then(d=>{ linksData=Array.isArray(d)?d:[]; vmSaveLS(); vmRenderTable(); vmUpdateStatus(); renderGrid(); });
});

// ── Table rendering ──────────────────────────────────────────────────
function vmVisibleFields(){
    return vmFieldConfig.filter(fc=>fc.visible)
        .map(fc=>{ const def=VM_FIELDS.find(f=>f.key===fc.key)||{key:fc.key,label:fc.key,editable:false,type:"text"}; return {...def,_width:fc.width}; });
}

function vmRenderTable(){
    const thead=document.getElementById("vmThead"), tbody=document.getElementById("vmTbody");
    thead.innerHTML=""; tbody.innerHTML="";
    const fields=vmVisibleFields();
    const displayData=vmSortCol ? [...linksData].sort((a,b)=>{
        let av=String(a[vmSortCol]??"").toLowerCase(), bv=String(b[vmSortCol]??"").toLowerCase();
        return vmSortAsc?(av<bv?-1:av>bv?1:0):(av>bv?-1:av<bv?1:0);
    }) : linksData;

    if(!displayData.length){
        tbody.innerHTML='<tr><td colspan="99" style="color:#888;padding:20px">No entries. Add rows as Admin.</td></tr>';
        vmUpdateSelInfo(); return;
    }

    // Header
    const chkTh=document.createElement("th"); chkTh.className="no-sort"; chkTh.style.width="32px";
    const chkAll=document.createElement("input"); chkAll.type="checkbox"; chkAll.title="Select all";
    chkAll.addEventListener("change",()=>{ if(chkAll.checked) displayData.forEach((_,i)=>vmSelected.add(i)); else vmSelected.clear(); vmRenderTable(); });
    chkTh.appendChild(chkAll); thead.appendChild(chkTh);
    const rowTh=document.createElement("th"); rowTh.className="no-sort"; rowTh.style.width="36px"; rowTh.textContent="#"; rowTh.style.color="#aaa"; thead.appendChild(rowTh);

    fields.forEach(f=>{
        const th=document.createElement("th");
        th.style.width=(f._width||100)+"px"; th.style.maxWidth=(f._width||100)+"px"; th.style.position="relative";
        th.textContent=f.label; th.className="sortable";
        if(f.key===vmSortCol) th.classList.add(vmSortAsc?"sort-asc":"sort-desc");
        th.addEventListener("click",e=>{ if(e.target.classList.contains("vm-resize-handle")) return; if(vmSortCol===f.key) vmSortAsc=!vmSortAsc; else{vmSortCol=f.key;vmSortAsc=true;} vmRenderTable(); });
        const rh=document.createElement("div"); rh.className="vm-resize-handle";
        rh.addEventListener("mousedown",ev=>{
            ev.preventDefault(); ev.stopPropagation(); rh.classList.add("resizing");
            const startX=ev.clientX; const fc=vmFieldConfig.find(fc=>fc.key===f.key); const startW=fc?fc.width:100;
            const onMove=me=>{ const nw=Math.max(30,Math.min(600,startW+(me.clientX-startX))); if(fc){fc.width=nw;th.style.width=nw+"px";th.style.maxWidth=nw+"px";} };
            const onUp=()=>{ rh.classList.remove("resizing"); document.removeEventListener("mousemove",onMove); document.removeEventListener("mouseup",onUp); if(fc) vmSaveLS(); };
            document.addEventListener("mousemove",onMove); document.addEventListener("mouseup",onUp);
        });
        th.appendChild(rh); thead.appendChild(th);
    });

    // Rows
    displayData.forEach((item,i)=>{
        const tr=document.createElement("tr"); tr.className="vm-row"+(vmSelected.has(i)?" selected":"");
        const chkTd=document.createElement("td"); const chk=document.createElement("input"); chk.type="checkbox"; chk.checked=vmSelected.has(i);
        chk.addEventListener("change",e=>{ e.stopPropagation(); if(chk.checked) vmSelected.add(i); else vmSelected.delete(i); vmUpdateSelInfo(); tr.classList.toggle("selected",vmSelected.has(i)); });
        chkTd.appendChild(chk); tr.appendChild(chkTd);
        const rowNumTd=document.createElement("td"); rowNumTd.style.color="#666"; rowNumTd.style.fontSize="11px"; rowNumTd.textContent=i+1; tr.appendChild(rowNumTd);

        tr.addEventListener("click",e=>{
            if(e.target.tagName==="INPUT") return;
            if(e.shiftKey&&vmLastClick>=0){ const lo=Math.min(i,vmLastClick),hi=Math.max(i,vmLastClick); for(let x=lo;x<=hi;x++) vmSelected.add(x); }
            else if(e.ctrlKey||e.metaKey){ if(vmSelected.has(i)) vmSelected.delete(i); else vmSelected.add(i); }
            else{ vmSelected.clear(); vmSelected.add(i); }
            vmLastClick=i; vmRenderTable();
        });

        fields.forEach(f=>{
            const td=document.createElement("td");
            td.style.width=(f._width||100)+"px"; td.style.maxWidth=(f._width||100)+"px";
            const val=item[f.key]!==undefined?String(item[f.key]):"";
            const canEdit=f.editable==="admin"&&vmIsAdmin;

            // Special rendering for 'show' column
            if(f.key==="show"){
                td.textContent=val;
                td.style.color=val==="1"?"#5f5":"#f66";
                td.style.fontWeight="bold";
            } else if(f.key==="cell"){
                td.textContent=val;
                const ok=parseCell(val);
                td.style.color=val===""?"#555":(ok?"#fc8":"#f66");
            } else {
                td.textContent=val;
            }

            if(canEdit){
                td.className="editable";
                td.addEventListener("click",e=>{ e.stopPropagation(); vmStartEdit(td,item,f); });
            } else { td.className="locked"; }
            tr.appendChild(td);
        });
        tbody.appendChild(tr);
    });
    vmUpdateSelInfo();
}

function vmUpdateSelInfo(){
    document.getElementById("vmSelInfo").textContent=vmSelected.size+" selected / "+linksData.length+" total";
}

function vmStartEdit(td,item,field){
    if(td.querySelector("input")) return;
    const prev=td.textContent; td.textContent="";
    const inp=document.createElement("input"); inp.type="text";
    inp.value=item[field.key]!==undefined?String(item[field.key]):""; inp.className="vm-cell-input";
    inp.placeholder=field.hint||"";
    function commit(){
        item[field.key]=inp.value.trim(); vmSaveLS();
        td.textContent=item[field.key]; td.className="editable";
        renderGrid();
    }
    inp.addEventListener("blur",commit);
    inp.addEventListener("keydown",e=>{ if(e.key==="Enter"){e.preventDefault();inp.blur();} if(e.key==="Escape"){td.textContent=prev;td.className="editable";} });
    td.appendChild(inp); inp.focus(); inp.select();
}

// ── Bootstrap ────────────────────────────────────────────────────────
setupLayout(); renderGrid();  // draw immediately, overlays will be empty until data loads

fetch("links.json?v="+Date.now())
    .then(r=>r.json()).catch(()=>[])
    .then(d=>{
        if(!vmLoadLS()){
            linksData=Array.isArray(d)?d:[];
            vmSaveLS();
        }
        renderGrid();
    });

window.addEventListener("resize",            ()=>{ setupLayout(); renderGrid(); });
window.addEventListener("orientationchange", ()=>{ setTimeout(()=>{ setupLayout(); renderGrid(); },350); });
</script>
