<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Mlynx</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { overflow: hidden; height: 100vh; background: #000; touch-action: manipulation; }

/* Canvas */
#rotateWrap {
  position: fixed;
  top: 0; left: 0;
}
#gameCanvas {
  display: block;
}

/* Hamburger */
#menuWrap {
  position: fixed;
  z-index: 999;
  width: 52px;
  height: 52px;
}
#menuWrap.portrait-mode {
  transform: rotate(90deg);
  transform-origin: 26px 26px;
}
#menuBtn {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(30,30,30,0.92);
  border: none;
  border-radius: 12px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 12px;
  touch-action: manipulation;
}
#menuBtn span {
  display: block;
  width: 100%; height: 3px;
  background: #fff;
  border-radius: 2px;
}

#menuPanel {
  position: absolute;
  bottom: 64px;
  right: 0;
  z-index: 998;
  background: rgba(25,25,25,0.96);
  border-radius: 12px;
  overflow-y: auto;
  max-height: 80vh;
  display: none;
  flex-direction: column;
  min-width: 210px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
}
#menuPanel.open { display: flex; }

/* Menu items */
#menuDateStamp {
  padding: 6px 12px 2px 12px;
  font: 10px Arial, sans-serif;
  color: rgba(255,255,255,0.35);
  text-align: right;
}
.menu-item {
  padding: 13px 18px;
  color: #fff;
  font: 15px Arial, sans-serif;
  cursor: pointer;
  white-space: nowrap;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.menu-item:last-child { border-bottom: none; }
.menu-item:hover { background: rgba(255,255,255,0.12); }
.menu-divider { height: 1px; background: rgba(255,255,255,0.15); margin: 2px 0; }

#settingsPanel {
  display: none;
  flex-direction: column;
  background: rgba(15,15,30,0.98);
  border-top: 1px solid rgba(255,255,255,0.1);
}
#settingsPanel.open { display: flex; }
.setting-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.setting-row span { color: #ccc; font: 14px Arial,sans-serif; }
.tog {
  position: relative;
  display: inline-block;
  width: 42px; height: 22px;
  flex-shrink: 0;
}
.tog input { opacity: 0; width: 0; height: 0; }
.tog-slider {
  position: absolute; cursor: pointer;
  inset: 0; background: #444;
  border-radius: 22px; transition: .2s;
}
.tog-slider:before {
  content: ""; position: absolute;
  width: 16px; height: 16px; left: 3px; bottom: 3px;
  background: #fff; border-radius: 50%; transition: .2s;
}
.tog input:checked + .tog-slider { background: #3a8a3a; }
.tog input:checked + .tog-slider:before { transform: translateX(20px); }

/* Cell overlays */
#cellOverlayContainer {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  pointer-events: none;
}
.cell-overlay {
  position: absolute;
  display: flex; align-items: flex-end; justify-content: center;
  overflow: hidden; cursor: pointer;
  user-select: none;
}
.cell-overlay img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
}
.cell-overlay img.fit-contain { object-fit: contain; background: rgba(0,0,0,0.18); }
.cell-overlay img.fit-cover { object-fit: cover; }
.cell-label {
  position: relative; z-index: 1;
  width: 100%; text-align: center;
  padding: 2px 4px;
  font-size: 11px; font-weight: bold;
  color: #fff; background: rgba(0,0,0,0.58);
  white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis;
}
.cell-overlay.label-only {
  align-items: center; justify-content: center;
  background: rgba(0,0,0,0.12);
}
.cell-overlay.label-only .cell-label {
  background: rgba(0,0,80,0.55);
  border-radius: 4px; padding: 3px 6px;
  width: auto; font-size: 12px;
}
.cell-attrib {
  position: absolute; bottom: 18px; right: 2px; z-index: 2;
  font-size: 9px; color: rgba(255,255,255,0.75);
  background: rgba(0,0,0,0.5);
  padding: 1px 4px; border-radius: 3px;
  white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; max-width: 90%;
}
.cell-id {
  position: absolute; top: 2px; left: 3px; z-index: 2;
  font-size: 9px; color: rgba(255,255,255,0.6);
  background: rgba(0,0,0,0.4);
  padding: 1px 3px; border-radius: 3px;
}

/* Empty hits */
#emptyCellHits {
  position: fixed; top: 0; left: 0;
  width: 100vw; height: 100vh;
}
.cell-empty-hit {
  position: absolute;
  border: 2px dashed rgba(100,180,255,0.0);
  transition: border-color .15s, background .15s;
  cursor: crosshair;
}
.cell-empty-hit:hover {
  border-color: rgba(100,180,255,0.6);
  background: rgba(100,180,255,0.07);
}

/* Fullscreen */
#fullscreenImg {
  display: none;
  position: fixed; inset: 0; z-index: 30000;
  background: rgba(0,0,0,0.95);
  align-items: center; justify-content: center;
}
#fullscreenImg.open { display: flex; }
#fullscreenImg img {
  max-width: 95vw; max-height: 95vh;
  object-fit: contain;
  touch-action: manipulation;
}
#fsCloseBtn, #fsCloseBtn2 {
  position: absolute;
  width: 52px; height: 52px;
  background: rgba(255,255,255,0.25);
  border: none; border-radius: 50%;
  color: #fff; font-size: 28px;
  cursor: pointer; backdrop-filter: blur(6px);
}
#fsCloseBtn { top: 18px; right: 18px; }
#fsCloseBtn2 { bottom: 18px; right: 18px; }

/* Quick-fill */
#qfModal {
  display: none; position: fixed; inset: 0; z-index: 20000;
  background: rgba(0,0,0,0.82);
  align-items: center; justify-content: center;
}
#qfModal.open { display: flex; }
#qfBox {
  background: #1a1a2e;
  border: 1px solid #555;
  border-radius: 12px;
  padding: 18px 20px;
  min-width: 280px;
  max-width: 480px;
  width: 92vw;
  display: flex;
  flex-direction: column;
  gap: 10px;
  font-family: Arial, sans-serif;
  max-height: 94vh;
  overflow-y: auto;
}
#qfBox h3 { color: #8ef; font-size: 15px; }
#qfBox label {
  font-size: 12px; color: #aaa;
  display: block; margin-bottom: 3px;
}
#qfBox input, #qfBox select {
  background: #0a0a1a;
  border: 1px solid #555;
  color: #fff;
  padding: 9px 10px;
  border-radius: 6px;
  font-size: 15px;
  width: 100%;
}
#qfBox input:focus, #qfBox select:focus {
  border-color: #8ef; outline: none;
}
#qfCname.has-prev { color: #6af; }
#qfCname.has-prev:focus { color: #fff; }
#qfLinkPreview {
  font-size: 11px; color: #888;
  word-break: break-all; min-height: 14px;
}
.qf-btns {
  display: flex; gap: 8px;
  justify-content: flex-end;
}
.qf-btns button {
  padding: 9px 20px;
  border-radius: 6px;
  border: 1px solid #555;
  background: #2a2a3e;
  color: #fff; font-size: 14px;
  cursor: pointer;
}
.qf-btns button.save {
  border-color: #5f5; color: #afa;
}
.qf-btns button:hover { background: #3a3a5e; }
#qfPasteBtn {
  width: 100%; padding: 11px;
  border-radius: 6px;
  border: 1px solid #4af;
  background: rgba(0,80,180,0.3);
  color: #8ef; font-size: 15px;
  cursor: pointer;
}
#qfPasteBtn:hover, #qfPasteBtn:active {
  background: rgba(0,80,180,0.55);
}
#qfError {
  color: #f66; font-size: 12px;
  min-height: 14px;
}
#qfDesktopFields { }

/* JSON Editor */
#jsonModal {
  display: none;
  position: fixed; inset: 0;
  z-index: 25000;
  background: rgba(0,0,0,0.88);
  align-items: center; justify-content: center;
}
#jsonModal.open { display: flex; }
#jsonBox {
  background: #1a1a2e;
  border: 1px solid #555;
  border-radius: 12px;
  padding: 20px;
  width: 90vw; height: 85vh;
  max-width: 800px; max-height: 90vh;
  display: flex; flex-direction: column;
  font-family: 'Courier New', monospace;
}
#jsonTitle {
  color: #8ef; font-size: 18px; padding-bottom: 12px;
  border-bottom: 1px solid #555;
}
#jsonText {
  flex: 1;
  background: #0a0a1a;
  border: 1px solid #444;
  color: #cfc;
  padding: 12px;
  font-size: 13px;
  line-height: 1.4;
  border-radius: 6px;
  resize: none;
  white-space: pre;
  overflow: auto;
}
#jsonText:focus { border-color: #8ef; outline: none; }
#jsonBtns {
  display: flex; gap: 10px;
  justify-content: flex-end;
  padding-top: 12px;
  border-top: 1px solid #555;
}
#jsonBtns button {
  padding: 10px 20px;
  border-radius: 6px;
  border: 1px solid #555;
  background: #2a2a3e;
  color: #fff; font-size: 14px;
  cursor: pointer;
}
#jsonBtns button.save { border-color: #5f5; color: #afa; }
#jsonBtns button:hover { background: #3a3a5e; }
#jsonStatus {
  font-size: 12px; color: #888;
  min-height: 16px; padding-top: 4px;
}
</style>
</head>
<body>

<div id="rotateWrap">
  <canvas id="gameCanvas"></canvas>
  <div id="cellOverlayContainer"></div>
  <div id="emptyCellHits"></div>
</div>

<div id="menuWrap">
  <div id="menuPanel">
    <div id="menuDateStamp"></div>
    <div class="menu-item" id="miTables">Tables</div>
    <div class="menu-divider"></div>
    <div class="menu-item" id="miSaveJson">💾 Save JSON (Ctrl+Alt+S)</div>
    <div class="menu-divider"></div>
    <div class="menu-item" id="miSettings">Settings ▸</div>
    <div id="settingsPanel">
      <div class="setting-row">
        <span id="miImgFitLabel">Img: Fill Cell</span>
        <label class="tog"><input type="checkbox" id="togImgFit"><span class="tog-slider"></span></label>
      </div>
      <div class="setting-row">
        <span>Cell name</span>
        <label class="tog"><input type="checkbox" id="togCellName"><span class="tog-slider"></span></label>
      </div>
      <div class="setting-row">
        <span>cname label</span>
        <label class="tog"><input type="checkbox" id="togCname" checked><span class="tog-slider"></span></label>
      </div>
      <div class="setting-row">
        <span>Attribution badge</span>
        <label class="tog"><input type="checkbox" id="togAttrib"><span class="tog-slider"></span></label>
      </div>
    </div>
    <div class="menu-divider"></div>
    <div class="menu-item" id="miHelp">Help</div>
  </div>
  <button id="menuBtn">
    <span></span><span></span><span></span>
  </button>
</div>

<!-- Fullscreen image -->
<div id="fullscreenImg">
  <button id="fsCloseBtn" title="Close">×</button>
  <button id="fsCloseBtn2" title="Close">×</button>
  <img id="fsImg">
</div>

<!-- Quick-fill modal -->
<div id="qfModal">
  <div id="qfBox">
    <h3 id="qfTitle">📌 Fill Cell</h3>
    <div class="qf-btns">
      <button id="qfCancelBtn">Cancel</button>
      <button id="qfSaveBtn" class="save">Save (Ctrl+S)</button>
    </div>
    <button id="qfPasteBtn">📋 Paste URL from clipboard</button>
    <div>
      <label>Image link</label>
      <input type="text" id="qfLink" inputmode="url" autocomplete="off">
      <div id="qfLinkPreview"></div>
    </div>
    <div>
      <label>Common name (cname)</label>
      <input type="text" id="qfCname" autocomplete="off">
    </div>
    <div id="qfDesktopFields">
      <div><label>Scientific name</label><input type="text" id="qfSname" autocomplete="off"></div>
      <div><label>Attribution</label><input type="text" id="qfAttrib" placeholder="© Author / CC BY 4.0" autocomplete="off"></div>
      <div><label>Comment</label><input type="text" id="qfComment" autocomplete="off"></div>
      <div><label>Asset</label>
        <select id="qfAsset"><option value="i">i — image</option><option value="v">v — video</option></select>
      </div>
      <div><label>Fit override</label>
        <select id="qfFit">
          <option value="">— default —</option>
          <option value="ei">ei — entire image</option>
          <option value="fc">fc — fill cell</option>
        </select>
      </div>
    </div>
    <div id="qfError"></div>
    <div class="qf-btns">
      <button id="qfCancelBtn2">Cancel</button>
      <button id="qfSaveBtn2" class="save">Save (Ctrl+S)</button>
    </div>
  </div>
</div>

<!-- JSON Editor Modal -->
<div id="jsonModal">
  <div id="jsonBox">
    <div id="jsonTitle">📋 links.json Editor</div>
    <textarea id="jsonText" placeholder='Paste JSON here...'></textarea>
    <div id="jsonBtns">
      <button id="jsonCancelBtn">Cancel</button>
      <button id="jsonApplyBtn" class="save">Apply</button>
      <button id="jsonDownloadBtn">Download links.json</button>
    </div>
    <div id="jsonStatus"></div>
  </div>
</div>

<script>
'use strict';

const GRID_COLS = 5, GRID_ROWS = 5, COL_LETTERS = "abcde";
const ISMOBILE = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

let GW=0, GH=0, cellW=0, cellH=0, isPortrait=false;
let imgFitMode = localStorage.getItem("mlynx-fit") || "fc";
let linksData  = [];
let showCellName = false, showCname = true, showAttrib = false;

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const rotateWrap = document.getElementById('rotateWrap');
const menuWrap = document.getElementById('menuWrap');

// helpers
function parseCell(s){ if(!s||s.length<2)return null; const r=parseInt(s[0]); const c=COL_LETTERS.indexOf(s[1].toLowerCase())+1; if(isNaN(r)||r<1||r>GRID_ROWS||c<1||c>GRID_COLS)return null; return{row:r,col:c}; }
function makeCellStr(r,c){ return r+COL_LETTERS[c-1]; }
function occupiedCells(){ const s=new Set(); linksData.forEach(it=>{ if(it.show==="1"){const p=parseCell(it.cell);if(p)s.add(makeCellStr(p.row,p.col));} }); return s; }

// layout (braintrain)
function setup(){
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  isPortrait = vw < vh;

  if(isPortrait){
    GW = vh; GH = vw;
    canvas.width  = GW;
    canvas.height = GH;
    rotateWrap.style.width  = GW + "px";
    rotateWrap.style.height = GH + "px";
    rotateWrap.style.transformOrigin = "0 0";
    rotateWrap.style.transform = "rotate(90deg) translateY(-" + vw + "px)";
    menuWrap.classList.add("portrait-mode");
    menuWrap.style.bottom = "14px";
    menuWrap.style.left = "14px";
    menuWrap.style.right = "auto";
  } else {
    GW = vw; GH = vh;
    canvas.width  = GW;
    canvas.height = GH;
    rotateWrap.style.width  = GW + "px";
    rotateWrap.style.height = GH + "px";
    rotateWrap.style.transformOrigin = "0 0";
    rotateWrap.style.transform = "none";
    menuWrap.classList.remove("portrait-mode");
    menuWrap.style.bottom = "14px";
    menuWrap.style.right = "14px";
    menuWrap.style.left = "auto";
  }
  cellW = GW / GRID_COLS;
  cellH = GH / GRID_ROWS;
  applyOverlayTransform();
}

function applyOverlayTransform(){
  const vw = window.innerWidth;
  const oc = document.getElementById("cellOverlayContainer");
  const eh = document.getElementById("emptyCellHits");
  if(isPortrait){
    const t = `rotate(90deg) translate(0px, -${vw}px)`;
    [oc, eh].forEach(el=>{
      el.style.width  = GW + "px";
      el.style.height = GH + "px";
      el.style.transformOrigin = "0 0";
      el.style.transform = t;
    });
  } else {
    [oc, eh].forEach(el=>{
      el.style.width  = "100vw";
      el.style.height = "100vh";
      el.style.transform = "none";
    });
  }
}

// render
function renderGrid(){
  if(!GW||!GH) return;
  ctx.fillStyle = '#c8ddf0'; ctx.fillRect(0,0,GW,GH);
  ctx.strokeStyle = '#002b55'; ctx.lineWidth = 2;
  for(let i=1;i<GRID_COLS;i++){ const x=Math.round(GW*i/GRID_COLS)+0.5; ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,GH); ctx.stroke(); }
  for(let i=1;i<GRID_ROWS;i++){ const y=Math.round(GH*i/GRID_ROWS)+0.5; ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(GW,y); ctx.stroke(); }

  if(showCellName && !ISMOBILE){
    const fs=Math.max(14,Math.floor(Math.min(cellW,cellH)*0.25));
    ctx.font=`bold ${fs}px Arial`; ctx.textAlign="center"; ctx.textBaseline="middle";
    for(let r=1;r<=GRID_ROWS;r++) for(let c=1;c<=GRID_COLS;c++){
      const cx=(c-0.5)*cellW, cy=(r-0.5)*cellH, label=r+COL_LETTERS[c-1];
      ctx.fillStyle="rgba(0,0,0,0.4)"; ctx.fillText(label,cx+1,cy+1);
      ctx.fillStyle="#ffffff"; ctx.fillText(label,cx,cy);
    }
    ctx.textAlign="left"; ctx.textBaseline="alphabetic";
  }
  updateCellOverlays();
  updateEmptyHits();
}
function render(){ renderGrid(); }

// overlays
function updateCellOverlays(){
  const cont = document.getElementById("cellOverlayContainer");
  cont.innerHTML = "";
  applyOverlayTransform();

  linksData.forEach(it=>{
    if(it.show!=="1") return;
    const pos=parseCell(it.cell); if(!pos) return;
    const x=(pos.col-1)*cellW, y=(pos.row-1)*cellH;

    const div=document.createElement("div");
    div.className="cell-overlay";
    div.style.cssText=`left:${x}px;top:${y}px;width:${cellW}px;height:${cellH}px;`;
    div.addEventListener("pointerup", e=>{ e.stopPropagation(); showFullscreen(it); });

    const hasImg = it.asset==="i" && it.link;
    if(hasImg){
      const img=document.createElement("img");
      img.src=it.link; img.alt=it.cname||"";
      const fit=it.fit||imgFitMode;
      img.className=(fit==="ei")?"fit-contain":"fit-cover";
      div.appendChild(img);
    } else if(!it.cname){ return; }
    if(!hasImg) div.classList.add("label-only");

    if(it.cname && showCname){
      const lbl=document.createElement("div");
      lbl.className="cell-label"; lbl.textContent=it.cname;
      div.appendChild(lbl);
    }
    if(it.attribution && showAttrib && !ISMOBILE){
      const att=document.createElement("span");
      att.className="cell-attrib"; att.textContent=it.attribution;
      div.appendChild(att);
    }
    if(showCellName && !ISMOBILE){
      const cid=document.createElement("span");
      cid.className="cell-id"; cid.textContent=it.cell;
      div.appendChild(cid);
    }
    cont.appendChild(div);
  });
}

function updateEmptyHits(){
  const hits = document.getElementById("emptyCellHits");
  hits.innerHTML = "";
  applyOverlayTransform();
  const occ = occupiedCells();
  for(let r=1;r<=GRID_ROWS;r++) for(let c=1;c<=GRID_COLS;c++){
    const cs = makeCellStr(r,c); if(occ.has(cs)) continue;
    const div = document.createElement("div");
    div.className = "cell-empty-hit";
    div.style.cssText = `left:${(c-1)*cellW}px;top:${(r-1)*cellH}px;width:${cellW}px;height:${cellH}px;`;
    div.title = "Add — " + cs;
    div.addEventListener("pointerup", e=>{ e.preventDefault(); openQF(cs); });
    hits.appendChild(div);
  }
}

// fullscreen
function showFullscreen(item){
  const fs = document.getElementById("fullscreenImg");
  const img = document.getElementById("fsImg");
  img.src = item.link;
  img.alt = (item.cname||"") + " — " + (item.attribution || "");
  fs.classList.add("open");
}
document.getElementById("fsCloseBtn").addEventListener("pointerup", ()=>document.getElementById("fullscreenImg").classList.remove("open"));
document.getElementById("fsCloseBtn2").addEventListener("pointerup", ()=>document.getElementById("fullscreenImg").classList.remove("open"));
document.getElementById("fullscreenImg").addEventListener("pointerup", e=>{
  if(e.target===document.getElementById("fullscreenImg")) document.getElementById("fullscreenImg").classList.remove("open");
});

// menu
const menuBtn = document.getElementById("menuBtn");
const menuPanel = document.getElementById("menuPanel");
function closeMenu(){
  menuPanel.classList.remove("open");
  document.getElementById("settingsPanel").classList.remove("open");
  document.getElementById("miSettings").textContent="Settings ▸";
}
menuBtn.addEventListener("pointerup", e=>{ e.stopPropagation(); menuPanel.classList.toggle("open"); });
document.addEventListener("pointerup", ()=>{ if(menuPanel.classList.contains("open")) closeMenu(); });
menuPanel.addEventListener("pointerup", e=>e.stopPropagation());
document.getElementById("miTables").addEventListener("pointerup", e=>{
  e.stopPropagation(); closeMenu();
  document.getElementById("jsonText").value = JSON.stringify(linksData, null, 2);
  document.getElementById("jsonModal").classList.add("open");
});
document.getElementById("miSaveJson").addEventListener("pointerup", e=>{
  e.stopPropagation(); closeMenu();
  saveLinksJson();
});
document.getElementById("miHelp").addEventListener("pointerup", e=>{
  e.stopPropagation(); closeMenu();
  alert("Mlynx\n\nTap image → fullscreen\nTap empty → quick-fill\nHamburger → Tables, Save JSON, Settings");
});
document.getElementById("miSettings").addEventListener("pointerup", e=>{
  e.stopPropagation();
  const sp=document.getElementById("settingsPanel");
  const open=sp.classList.toggle("open");
  e.currentTarget.textContent=open?"Settings ▾":"Settings ▸";
});

function syncFitToggle(){
  const chk=document.getElementById("togImgFit");
  chk.checked=(imgFitMode==="ei");
  document.getElementById("miImgFitLabel").textContent=imgFitMode==="ei"?"Img: Entire Image":"Img: Fill Cell";
}
document.getElementById("togImgFit").addEventListener("change",function(){
  imgFitMode=this.checked?"ei":"fc";
  localStorage.setItem("mlynx-fit",imgFitMode);
  syncFitToggle(); render();
});
document.getElementById("togCellName").addEventListener("change",function(){ showCellName=this.checked; render(); });
document.getElementById("togCname").addEventListener("change",function(){ showCname=this.checked; render(); });
document.getElementById("togAttrib").addEventListener("change",function(){ showAttrib=this.checked; render(); });

// date stamp
(()=>{
  const d=new Date();
  const el=document.getElementById("menuDateStamp");
  if(el) el.textContent=
    d.toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric",year:"numeric"})+" "+
    d.toLocaleTimeString(undefined,{hour:"2-digit",minute:"2-digit"});
})();

// Hotkey Ctrl+Alt+S — Save JSON
document.addEventListener("keydown", e=>{
  if(e.ctrlKey && e.altKey && e.key.toLowerCase()==='s'){
    e.preventDefault();
    saveLinksJson();
  }
});

// quick-fill with auto-save
let qfTargetCell = "";
function applyMobileQF(){ document.getElementById("qfDesktopFields").style.display = ISMOBILE ? "none" : "block"; }

async function openQF(cs){
  qfTargetCell = cs;
  applyMobileQF();
  const ex = linksData.find(it=>it.cell===cs);
  let linkVal = ex ? (ex.link || "") : "";
  if(!ISMOBILE){
    try{ const clip = (await navigator.clipboard.readText()).trim(); if(/^https?:\/\//i.test(clip)) linkVal = clip; }catch(e){}
  }
  document.getElementById("qfLink").value = linkVal;
  document.getElementById("qfLinkPreview").textContent = linkVal || "";
  const cnameEl = document.getElementById("qfCname");
  const prev = ex ? (ex.cname || "") : "";
  cnameEl.value = prev;
  if(prev){
    cnameEl.classList.add("has-prev");
    cnameEl.addEventListener("input", function h(){ cnameEl.classList.remove("has-prev"); cnameEl.removeEventListener("input",h); }, {once:true});
  } else cnameEl.classList.remove("has-prev");
  if(!ISMOBILE){
    document.getElementById("qfSname").value   = ex ? (ex.sname || "") : "";
    document.getElementById("qfAttrib").value  = ex ? (ex.attribution || "") : "";
    document.getElementById("qfComment").value = ex ? (ex.comment || "") : "";
    document.getElementById("qfAsset").value   = ex ? (ex.asset || "i") : "i";
    document.getElementById("qfFit").value     = ex ? (ex.fit || "") : "";
  }
  document.getElementById("qfTitle").textContent = "📌 " + cs;
  document.getElementById("qfError").textContent = "";
  document.getElementById("qfModal").classList.add("open");
  setTimeout(()=>document.getElementById(linkVal ? "qfCname" : "qfLink").focus(), 80);
}

async function qfSave(){
  const link  = document.getElementById("qfLink").value.trim();
  const cname = document.getElementById("qfCname").value.trim();
  if(!link && !cname){ document.getElementById("qfError").textContent="Need link or cname"; return; }
  const sname   = ISMOBILE ? "" : document.getElementById("qfSname").value.trim();
  const attrib  = ISMOBILE ? "" : document.getElementById("qfAttrib").value.trim();
  const comment = ISMOBILE ? "" : document.getElementById("qfComment").value.trim();
  const asset   = ISMOBILE ? "i" : document.getElementById("qfAsset").value;
  const fit     = ISMOBILE ? "" : document.getElementById("qfFit").value;

  let e = linksData.find(it=>it.cell===qfTargetCell);
  if(e){
    Object.assign(e, {show:"1", asset, fit, link, cname, sname, attribution: attrib, comment});
  } else {
    linksData.push({show:"1", asset, cell: qfTargetCell, fit, link, cname, sname, attribution: attrib, comment});
  }

  localStorage.setItem("mlynx-links", JSON.stringify(linksData));
  document.getElementById("qfModal").classList.remove("open");
  render();
}
["qfSaveBtn","qfSaveBtn2"].forEach(id=>document.getElementById(id).addEventListener("pointerup", e=>{ e.stopPropagation(); qfSave(); }));
["qfCancelBtn","qfCancelBtn2"].forEach(id=>document.getElementById(id).addEventListener("pointerup", e=>{ e.stopPropagation(); document.getElementById("qfModal").classList.remove("open"); }));
document.getElementById("qfLink").addEventListener("input", function(){ document.getElementById("qfLinkPreview").textContent = this.value || ""; });
document.getElementById("qfModal").addEventListener("pointerup", e=>e.stopPropagation());
// Ctrl+S inside quick-fill
document.getElementById("qfModal").addEventListener("keydown", e=>{
  if(e.ctrlKey && e.key.toLowerCase()==="s"){ e.preventDefault(); qfSave(); }
});

document.getElementById("qfPasteBtn").addEventListener("pointerup", async e=>{
  e.stopPropagation();
  try{
    const text = await navigator.clipboard.readText();
    if(/^https?:\/\//i.test(text.trim())){
      document.getElementById("qfLink").value = text.trim();
      document.getElementById("qfLinkPreview").textContent = text.trim();
    } else alert("No URL found in clipboard.");
  }catch(err){
    document.getElementById("qfLink").focus();
    alert("Tap the Image link field and use your browser Paste option.");
  }
});

// JSON Editor
document.getElementById("jsonApplyBtn").addEventListener("pointerup", ()=>{
  try{
    const newData = JSON.parse(document.getElementById("jsonText").value);
    linksData = Array.isArray(newData) ? newData : linksData;
    localStorage.setItem("mlynx-links", JSON.stringify(linksData));
    document.getElementById("jsonModal").classList.remove("open");
    render();
    document.getElementById("jsonStatus").textContent = "✅ Applied!";
  }catch(e){
    document.getElementById("jsonStatus").textContent = "❌ Invalid JSON: " + e.message;
  }
});
document.getElementById("jsonDownloadBtn").addEventListener("pointerup", saveLinksJson);
document.getElementById("jsonCancelBtn").addEventListener("pointerup", ()=>document.getElementById("jsonModal").classList.remove("open"));
document.getElementById("jsonModal").addEventListener("pointerup", e=>e.stopPropagation());

// Save JSON helper
function saveLinksJson(){
  const blob = new Blob([JSON.stringify(linksData, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'links.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}

// bootstrap
async function init(){
  setup();
  syncFitToggle();

  try{
    const resp = await fetch("links.json?v=" + Date.now());
    linksData = await resp.json();
  }catch(e){
    try{
      const ls = localStorage.getItem("mlynx-links");
      linksData = ls ? JSON.parse(ls) : [];
    }catch(e2){ linksData = []; }
  }

  render();
}

init();
window.addEventListener("resize", ()=>{ setup(); render(); });
window.addEventListener("orientationchange", ()=>setTimeout(()=>{ setup(); render(); }, 350));
</script>
