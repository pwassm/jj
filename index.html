<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Mlynx</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { overflow: hidden; touch-action: manipulation; background: #000; }
#rotateWrap { position: fixed; top: 0; left: 0; }
#gameCanvas  { display: block; }

/* Hamburger */
#menuWrap { position: fixed; z-index: 999; width: 48px; height: 48px; }
#menuWrap.portrait-mode { transform: rotate(90deg); transform-origin: 24px 24px; }
#menuBtn {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(30,30,30,0.82); border: none; border-radius: 10px;
  cursor: pointer; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 6px; padding: 10px;
  touch-action: manipulation;
}
#menuBtn.open { background: rgba(30,30,30,0.97); }
#menuBtn span { display: block; width: 100%; height: 3px; background: #fff; border-radius: 2px; }
#menuPanel {
  position: absolute; bottom: 54px; right: 0; z-index: 998;
  background: rgba(25,25,25,0.96); border-radius: 10px;
  overflow-y: auto; max-height: 80vh;
  display: none; flex-direction: column; min-width: 200px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.3) transparent;
}
#menuPanel::-webkit-scrollbar { width: 6px; }
#menuPanel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 3px; }
#menuPanel.open { display: flex; }
#menuDateStamp {
  padding: 6px 12px 2px 12px; font: 10px Arial,sans-serif;
  color: rgba(255,255,255,0.35); text-align: right;
  flex-shrink: 0; user-select: none; letter-spacing: 0.3px;
}
.menu-item {
  padding: 13px 18px; color: #fff; font: 15px Arial,sans-serif;
  cursor: pointer; white-space: nowrap;
  border-bottom: 1px solid rgba(255,255,255,0.08); flex-shrink: 0;
}
.menu-item:last-child { border-bottom: none; }
.menu-item:hover, .menu-item:active { background: rgba(255,255,255,0.12); }
.menu-divider { height: 1px; background: rgba(255,255,255,0.15); margin: 2px 0; flex-shrink: 0; }
#settingsPanel { display: none; flex-direction: column; background: rgba(12,12,28,0.99); flex-shrink: 0; }
#settingsPanel.open { display: flex; }
.setting-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 20px; border-bottom: 1px solid rgba(255,255,255,0.06);
}
.setting-row span { color: #ccc; font: 14px Arial,sans-serif; }
.tog { position: relative; display: inline-block; width: 42px; height: 22px; flex-shrink: 0; }
.tog input { opacity: 0; width: 0; height: 0; }
.tog-slider { position: absolute; cursor: pointer; inset: 0; background: #444; border-radius: 22px; transition: .2s; }
.tog-slider:before { content:""; position: absolute; width: 16px; height: 16px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: .2s; }
.tog input:checked + .tog-slider { background: #2a8a2a; }
.tog input:checked + .tog-slider:before { transform: translateX(20px); }

/* Cell overlays — inside rotateWrap */
.cell-overlay {
  position: absolute; overflow: hidden; cursor: pointer;
  display: flex; align-items: flex-end; justify-content: center;
}
.cell-overlay img { position: absolute; inset: 0; width: 100%; height: 100%; }
.cell-overlay img.ei { object-fit: contain; background: rgba(0,0,0,0.15); }
.cell-overlay img.fc { object-fit: cover; }
.cell-label {
  position: relative; z-index: 1; width: 100%; text-align: center;
  padding: 2px 4px; font: bold 11px Arial,sans-serif; color: #fff;
  background: rgba(0,0,0,0.58); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.cell-empty {
  position: absolute; cursor: crosshair;
  border: 2px dashed rgba(100,180,255,0);
  transition: border-color .15s, background .15s;
}
.cell-empty:hover { border-color: rgba(100,180,255,0.6); background: rgba(100,180,255,0.07); }

/* Fullscreen */
#fsWrap {
  display: none; position: fixed; inset: 0; z-index: 40000;
  background: rgba(0,0,0,0.95); align-items: center; justify-content: center;
}
#fsWrap.open { display: flex; }
#fsWrap img { max-width: 95vw; max-height: 95vh; object-fit: contain; }
#fsClose, #fsClose2 {
  position: absolute; width: 52px; height: 52px;
  background: rgba(255,255,255,0.22); border: none; border-radius: 50%;
  color: #fff; font-size: 30px; cursor: pointer;
}
#fsClose  { top: 16px; right: 16px; }
#fsClose2 { bottom: 16px; right: 16px; }

/* Quick-fill */
#qfModal {
  display: none; position: fixed; inset: 0; z-index: 20000;
  background: rgba(0,0,0,0.82); align-items: center; justify-content: center;
}
#qfModal.open { display: flex; }
#qfBox {
  background: #1a1a2e; border: 1px solid #555; border-radius: 12px;
  padding: 18px 20px; min-width: 280px; max-width: 480px; width: 92vw;
  display: flex; flex-direction: column; gap: 10px;
  font-family: Arial,sans-serif; max-height: 94vh; overflow-y: auto;
}
#qfBox h3 { color: #8ef; font-size: 15px; }
#qfBox label { font-size: 12px; color: #aaa; display: block; margin-bottom: 3px; }
#qfBox input, #qfBox select {
  background: #0a0a1a; border: 1px solid #555; color: #fff;
  padding: 9px 10px; border-radius: 6px; font-size: 15px; width: 100%;
}
#qfBox input:focus, #qfBox select:focus { border-color: #8ef; outline: none; }
#qfLinkPrev { font-size: 11px; color: #888; word-break: break-all; min-height: 14px; }
#qfError { color: #f66; font-size: 12px; min-height: 14px; }
.qf-row { display: flex; gap: 8px; justify-content: flex-end; }
.qf-row button {
  padding: 9px 18px; border-radius: 6px; border: 1px solid #555;
  background: #2a2a3e; color: #fff; font-size: 14px; cursor: pointer;
}
.qf-row button.save { border-color: #5f5; color: #afa; }
.qf-row button:hover { background: #3a3a5e; }
#qfPasteBtn {
  width: 100%; padding: 11px; border-radius: 6px;
  border: 1px solid #4af; background: rgba(0,80,180,0.3);
  color: #8ef; font-size: 15px; cursor: pointer;
}
#qfPasteBtn:hover, #qfPasteBtn:active { background: rgba(0,80,180,0.5); }

/* JSON Editor */
#jsonModal {
  display: none; position: fixed; inset: 0; z-index: 25000;
  background: rgba(0,0,0,0.88); align-items: center; justify-content: center;
}
#jsonModal.open { display: flex; }
#jsonBox {
  background: #1a1a2e; border: 1px solid #555; border-radius: 12px;
  padding: 20px; width: 90vw; height: 85vh; max-width: 820px;
  display: flex; flex-direction: column; font-family: 'Courier New',monospace;
}
#jsonTitle { color: #8ef; font-size: 17px; padding-bottom: 10px; border-bottom: 1px solid #444; margin-bottom: 8px; }
#jsonText {
  flex: 1; background: #0a0a1a; border: 1px solid #444; color: #cfc;
  padding: 12px; font-size: 13px; line-height: 1.4; border-radius: 6px;
  resize: none; white-space: pre; overflow: auto;
}
#jsonText:focus { border-color: #8ef; outline: none; }
#jsonBtns { display: flex; gap: 10px; justify-content: flex-end; padding-top: 10px; }
#jsonBtns button {
  padding: 10px 18px; border-radius: 6px; border: 1px solid #555;
  background: #2a2a3e; color: #fff; font-size: 14px; cursor: pointer;
}
#jsonBtns button.save { border-color: #5f5; color: #afa; }
#jsonBtns button:hover { background: #3a3a5e; }
#jsonStatus { font-size: 12px; color: #888; min-height: 16px; padding-top: 4px; }

.github-token-setup {
  display: none;
  flex-direction: column;
  gap: 8px;
  padding: 11px 20px 14px 20px;
  background: #0d0d20;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.github-token-setup label { font: 12px Arial,sans-serif; color: #aaa; margin-bottom: 2px; }
.github-token-setup.open { display: flex; }
.token-input { background: #0a0a1a; border: 1px solid #555; color: #fff; padding: 9px 10px; border-radius: 6px; font-size: 14px; width: 100%; outline: none; }
.token-input:focus { border-color: #8ef; }
.token-status { font-size: 12px; color: #8ef; min-height: 14px; }
</style>
</head>
<body>

<div id="rotateWrap">
  <canvas id="gameCanvas"></canvas>
  <!-- cell overlays injected here by JS, rotate with canvas -->
</div>

<div id="menuWrap">
  <div id="menuPanel">
    <div id="menuDateStamp"></div>
    <div class="menu-item" id="miTables">Tables (JSON editor)</div>
    <div class="menu-divider"></div>
    <div class="menu-item" id="miSaveJson">&#x1F4BE; Save JSON &nbsp;<small style="opacity:.5;font-size:11px">Ctrl+Alt+S</small></div>
    <div class="menu-item" id="miPushGithub">&#x2601; Push to GitHub</div>
    <div class="menu-divider"></div>
    <div class="menu-item" id="miSettings">Settings &#x25B8;</div>
    <div id="settingsPanel">
      <div class="setting-row">
        <span id="fitLabel">Img: Fill Cell</span>
        <label class="tog"><input type="checkbox" id="togFit"><span class="tog-slider"></span></label>
      </div>
      <div class="setting-row">
        <span>Cell labels</span>
        <label class="tog"><input type="checkbox" id="togCellLbl"><span class="tog-slider"></span></label>
      </div>
      <div class="setting-row">
        <span>cname label</span>
        <label class="tog"><input type="checkbox" id="togCname" checked><span class="tog-slider"></span></label>
      </div>
      <div class="setting-row">
        <span>GitHub Sync</span>
        <label class="tog"><input type="checkbox" id="togGithub"><span class="tog-slider"></span></label>
      </div>
      <div class="github-token-setup" id="githubTokenSetup">
        <label for="tokenInput">GitHub Fine-Grained PAT (Contents:Write)</label>
        <input type="password" id="tokenInput" class="token-input" placeholder="github_pat_...">
        <div class="token-status" id="tokenStatus"></div>
      </div>
    </div>
    <div class="menu-divider"></div>
    <div class="menu-item" id="miHelp">Help</div>
  </div>
  <button id="menuBtn"><span></span><span></span><span></span></button>
</div>

<div id="fsWrap">
  <button id="fsClose">&#215;</button>
  <button id="fsClose2">&#215;</button>
  <img id="fsImg">
</div>

<div id="qfModal">
  <div id="qfBox">
    <h3 id="qfTitle">&#x1F4CC; Fill Cell</h3>
    <div class="qf-row">
      <button id="qfCancel">Cancel</button>
      <button class="save" id="qfSave">Save &nbsp;<small style="opacity:.5;font-size:11px">Ctrl+S</small></button>
    </div>
    <button id="qfPasteBtn">&#x1F4CB; Paste URL from clipboard</button>
    <div><label>Image link</label><input type="text" id="qfLink" inputmode="url" autocomplete="off"><div id="qfLinkPrev"></div></div>
    <div><label>Common name (cname)</label><input type="text" id="qfCname" autocomplete="off"></div>
    <div id="qfDesktop">
      <div><label>Scientific name</label><input type="text" id="qfSname" autocomplete="off"></div>
      <div><label>Attribution</label><input type="text" id="qfAttrib" placeholder="&#169; Author / CC BY 4.0" autocomplete="off"></div>
      <div><label>Comment</label><input type="text" id="qfComment" autocomplete="off"></div>
      <div><label>Asset</label>
        <select id="qfAsset"><option value="i">i &mdash; image</option><option value="v">v &mdash; video</option></select>
      </div>
      <div><label>Fit override</label>
        <select id="qfFit">
          <option value="">&mdash; default &mdash;</option>
          <option value="ei">ei &mdash; entire image</option>
          <option value="fc">fc &mdash; fill cell</option>
        </select>
      </div>
    </div>
    <div id="qfError"></div>
    <div class="qf-row">
      <button id="qfCancel2">Cancel</button>
      <button class="save" id="qfSave2">Save &nbsp;<small style="opacity:.5;font-size:11px">Ctrl+S</small></button>
    </div>
  </div>
</div>

<div id="jsonModal">
  <div id="jsonBox">
    <div id="jsonTitle">&#x1F4CB; links.json Editor</div>
    <textarea id="jsonText"></textarea>
    <div id="jsonBtns">
      <button id="jsonCancel">Cancel</button>
      <button class="save" id="jsonApply">Apply</button>
      <button id="jsonDl">Download links.json</button>
    </div>
    <div id="jsonStatus"></div>
  </div>
</div>

<script>
'use strict';

const COLS=5, ROWS=5, LETTERS="abcde";
const ISMOBILE = ('ontouchstart' in window) || navigator.maxTouchPoints>0;

let GW=0, GH=0, cellW=0, cellH=0, isPortrait=false, bgColor='#c8ddf0';
let fitMode = localStorage.getItem("seeandlearn-fit")||"fc";
let showCellLbl=false, showCname=true;
let linksData=[];

const canvas    = document.getElementById('gameCanvas');
const ctx       = canvas.getContext('2d');
const wrap      = document.getElementById('rotateWrap');
const menuWrap  = document.getElementById('menuWrap');
const menuBtn   = document.getElementById('menuBtn');
const menuPanel = document.getElementById('menuPanel');

// helpers
function parseCell(s){
  if(!s||s.length<2) return null;
  const r=parseInt(s[0]), c=LETTERS.indexOf(s[1].toLowerCase())+1;
  if(isNaN(r)||r<1||r>ROWS||c<1||c>COLS) return null;
  return {row:r,col:c};
}
function mkCell(r,c){ return r+LETTERS[c-1]; }
function occupied(){
  const s=new Set();
  linksData.forEach(it=>{ if(it.show==="1"){ const p=parseCell(it.cell); if(p) s.add(mkCell(p.row,p.col)); }});
  return s;
}

// layout — exact braintrain pattern from paste.txt
function setupLayout(){
  const pw=window.innerWidth, ph=window.innerHeight;
  isPortrait = pw<ph;
  bgColor = Math.min(pw,ph)<600 ? '#7ab8e8' : '#ffffff';
  if(isPortrait){
    GW=ph; GH=pw;
    canvas.width=GW; canvas.height=GH;
    wrap.style.cssText='width:'+GW+'px;height:'+GH+'px;transform-origin:0 0;transform:rotate(90deg) translateY(-'+pw+'px)';
  } else {
    GW=pw; GH=ph;
    canvas.width=GW; canvas.height=GH;
    wrap.style.cssText='width:'+GW+'px;height:'+GH+'px;transform-origin:0 0;transform:none';
  }
  cellW=GW/COLS; cellH=GH/ROWS;
  updateMenuPosition();
}

function updateMenuPosition(){
  const PAD=14;
  if(isPortrait){
    menuWrap.classList.add('portrait-mode');
    menuWrap.style.cssText='bottom:'+PAD+'px;left:'+PAD+'px;right:auto';
  } else {
    menuWrap.classList.remove('portrait-mode');
    menuWrap.style.cssText='bottom:'+PAD+'px;right:'+PAD+'px;left:auto';
  }
}

// render
function renderGrid(){
  if(!GW||!GH) return;
  ctx.fillStyle=bgColor; ctx.fillRect(0,0,GW,GH);
  ctx.strokeStyle='#002b55'; ctx.lineWidth=1;
  for(let i=1;i<COLS;i++){ const x=GW*i/COLS; ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,GH); ctx.stroke(); }
  for(let i=1;i<ROWS;i++){ const y=GH*i/ROWS; ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(GW,y); ctx.stroke(); }
  if(showCellLbl){
    const fs=Math.max(10,Math.floor(Math.min(cellW,cellH)*0.22));
    ctx.font='bold '+fs+'px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
    for(let r=1;r<=ROWS;r++) for(let c=1;c<=COLS;c++){
      const cx=(c-.5)*cellW, cy=(r-.5)*cellH, lbl=r+LETTERS[c-1];
      ctx.fillStyle='rgba(0,0,0,0.35)'; ctx.fillText(lbl,cx+1,cy+1);
      ctx.fillStyle='rgba(60,60,180,0.75)'; ctx.fillText(lbl,cx,cy);
    }
    ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  }
  buildOverlays();
}

// overlays inside rotateWrap — rotate with canvas automatically
function buildOverlays(){
  wrap.querySelectorAll('.cell-overlay,.cell-empty').forEach(el=>el.remove());
  const occ=occupied();

  linksData.forEach(it=>{
    if(it.show!=='1') return;
    const pos=parseCell(it.cell); if(!pos) return;
    const x=(pos.col-1)*cellW, y=(pos.row-1)*cellH;
    const div=document.createElement('div');
    div.className='cell-overlay';
    div.style.cssText='left:'+x+'px;top:'+y+'px;width:'+cellW+'px;height:'+cellH+'px;';
    if(it.asset==='i' && it.link){
      const img=document.createElement('img');
      img.src=it.link; img.alt=it.cname||'';
      img.className=(it.fit||fitMode)==='ei'?'ei':'fc';
      div.appendChild(img);
    }
    if(it.cname && showCname){
      const lbl=document.createElement('div');
      lbl.className='cell-label'; lbl.textContent=it.cname;
      div.appendChild(lbl);
    }
    div.addEventListener('pointerup',e=>{ e.stopPropagation(); openFS(it); });
    wrap.appendChild(div);
  });

  for(let r=1;r<=ROWS;r++) for(let c=1;c<=COLS;c++){
    const cs=mkCell(r,c); if(occ.has(cs)) continue;
    const div=document.createElement('div');
    div.className='cell-empty';
    div.style.cssText='left:'+(c-1)*cellW+'px;top:'+(r-1)*cellH+'px;width:'+cellW+'px;height:'+cellH+'px;';
    div.title='Add -- '+cs;
    div.addEventListener('pointerup',e=>{ e.preventDefault(); openQF(cs); });
    wrap.appendChild(div);
  }
}

function render(){ renderGrid(); }

// fullscreen
function openFS(it){
  document.getElementById('fsImg').src=it.link;
  document.getElementById('fsWrap').classList.add('open');
}
['fsClose','fsClose2'].forEach(id=>
  document.getElementById(id).addEventListener('pointerup',()=>document.getElementById('fsWrap').classList.remove('open'))
);
document.getElementById('fsWrap').addEventListener('pointerup',e=>{
  if(e.target===document.getElementById('fsWrap')) document.getElementById('fsWrap').classList.remove('open');
});

// menu
function closeMenu(){
  menuPanel.classList.remove('open');
  menuBtn.classList.remove('open');
  document.getElementById('settingsPanel').classList.remove('open');
  document.getElementById('miSettings').textContent='Settings \u25b8';
}
menuBtn.addEventListener('pointerup',e=>{
  e.stopPropagation();
  const o=menuPanel.classList.toggle('open');
  menuBtn.classList.toggle('open',o);
  if(!o) document.getElementById('settingsPanel').classList.remove('open');
});
menuPanel.addEventListener('pointerup',e=>e.stopPropagation());
document.addEventListener('pointerup',()=>{ if(menuPanel.classList.contains('open')) closeMenu(); });

document.getElementById('miTables').addEventListener('pointerup',e=>{
  e.stopPropagation(); closeMenu();
  document.getElementById('jsonText').value=JSON.stringify(linksData,null,2);
  document.getElementById('jsonStatus').textContent='';
  document.getElementById('jsonModal').classList.add('open');
});
document.getElementById('miSaveJson').addEventListener('pointerup',e=>{ e.stopPropagation(); closeMenu(); saveJson(); });
document.getElementById('miHelp').addEventListener('pointerup',e=>{
  e.stopPropagation(); closeMenu();
  alert('Mlynx\n\nTap cell image -> fullscreen\nTap empty cell -> quick-fill (Ctrl+S to save)\nHamburger -> Tables (JSON editor), Save JSON (Ctrl+Alt+S), Settings');
});
document.getElementById('miSettings').addEventListener('pointerup',e=>{
  e.stopPropagation();
  const sp=document.getElementById('settingsPanel');
  const o=sp.classList.toggle('open');
  e.currentTarget.textContent=o?'Settings \u25be':'Settings \u25b8';
});

function syncFit(){
  document.getElementById('togFit').checked=(fitMode==='ei');
  document.getElementById('fitLabel').textContent=fitMode==='ei'?'Img: Entire Image':'Img: Fill Cell';
}
document.getElementById('togFit').addEventListener('change',function(){
  fitMode=this.checked?'ei':'fc'; localStorage.setItem('seeandlearn-fit',fitMode); syncFit(); render();
});
document.getElementById('togCellLbl').addEventListener('change',function(){ showCellLbl=this.checked; render(); });
document.getElementById('togCname').addEventListener('change',function(){ showCname=this.checked; render(); });

(()=>{
  const d=new Date();
  document.getElementById('menuDateStamp').textContent=
    d.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric',year:'numeric'})+
    ' '+d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});
})();

// Ctrl+Alt+S global
document.addEventListener('keydown',e=>{
  if(e.ctrlKey&&e.altKey&&e.key.toLowerCase()==='s'){ e.preventDefault(); saveJson(); }
});

// Save JSON
function saveJson(){
  localStorage.setItem('seeandlearn-links',JSON.stringify(linksData));
  const blob=new Blob([JSON.stringify(linksData,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download='links.json';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(a.href);
}

// Quick-fill
let qfCell='';
document.getElementById('qfDesktop').style.display=ISMOBILE?'none':'block';

async function openQF(cs){
  qfCell=cs;
  const ex=linksData.find(it=>it.cell===cs);
  let lv=ex?(ex.link||''):'';
  if(!ISMOBILE){
    try{ const c=(await navigator.clipboard.readText()).trim(); if(/^https?:\/\//i.test(c)) lv=c; }catch(e){}
  }
  document.getElementById('qfLink').value=lv;
  document.getElementById('qfLinkPrev').textContent=lv;
  document.getElementById('qfCname').value=ex?(ex.cname||''):'';
  if(!ISMOBILE){
    document.getElementById('qfSname').value  =ex?(ex.sname||''):'';
    document.getElementById('qfAttrib').value =ex?(ex.attribution||''):'';
    document.getElementById('qfComment').value=ex?(ex.comment||''):'';
    document.getElementById('qfAsset').value  =ex?(ex.asset||'i'):'i';
    document.getElementById('qfFit').value    =ex?(ex.fit||''):'';
  }
  document.getElementById('qfTitle').textContent='Pin '+cs;
  document.getElementById('qfError').textContent='';
  document.getElementById('qfModal').classList.add('open');
  setTimeout(()=>document.getElementById(lv?'qfCname':'qfLink').focus(),80);
}

function qfSave(){
  const link =document.getElementById('qfLink').value.trim();
  const cname=document.getElementById('qfCname').value.trim();
  if(!link&&!cname){ document.getElementById('qfError').textContent='Need link or cname'; return; }
  const sname  =ISMOBILE?'':document.getElementById('qfSname').value.trim();
  const attrib =ISMOBILE?'':document.getElementById('qfAttrib').value.trim();
  const comment=ISMOBILE?'':document.getElementById('qfComment').value.trim();
  const asset  =ISMOBILE?'i':document.getElementById('qfAsset').value;
  const fit    =ISMOBILE?'':document.getElementById('qfFit').value;
  let e=linksData.find(it=>it.cell===qfCell);
  if(e) Object.assign(e,{show:'1',asset,fit,link,cname,sname,attribution:attrib,comment});
  else  linksData.push({show:'1',asset,cell:qfCell,fit,link,cname,sname,attribution:attrib,comment});
  localStorage.setItem('seeandlearn-links',JSON.stringify(linksData));
  document.getElementById('qfModal').classList.remove('open');
  render();
}

// --- GITHUB INTEGRATION ---
async function pushToGitHub() {
  const token = localStorage.getItem('github-token');
  if (!token) {
    alert("1. Open Settings -> Turn on GitHub Sync\n2. Paste your token and press Enter");
    document.getElementById('settingsPanel').classList.add('open');
    const tg = document.getElementById('togGithub');
    if (tg) tg.checked = true;
    const setup = document.getElementById('githubTokenSetup');
    if (setup) setup.classList.add('open');
    const inp = document.getElementById('tokenInput');
    if (inp) inp.focus();
    return;
  }
  let owner = localStorage.getItem('github-owner') || '';
  let repo = localStorage.getItem('github-repo') || '';
  owner = prompt('GitHub Owner (username):', owner) || '';
  repo = prompt('Repository Name:', repo) || '';
  if (!owner || !repo) return;

  localStorage.setItem('github-owner', owner);
  localStorage.setItem('github-repo', repo);

  try {
    const path = 'links.json';
    const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
    const headers = { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json' };

    const getRes = await fetch(apiUrl, { headers });
    if (!getRes.ok) throw new Error('Could not find repository or file. Check permissions.');
    const { sha } = await getRes.json();

    const jsonText = JSON.stringify(linksData, null, 2);
    const contentB64 = btoa(unescape(encodeURIComponent(jsonText)));

    const putRes = await fetch(apiUrl, {
      method: 'PUT',
      headers,
      body: JSON.stringify({ message: 'Update links.json via SeeAndLearn', content: contentB64, sha })
    });

    if (putRes.ok) alert('✅ Successfully pushed to GitHub!');
    else throw new Error(await putRes.text());
  } catch (err) {
    alert('❌ GitHub error: ' + err.message);
  }
}

document.getElementById('miPushGithub').addEventListener('pointerup', function(e) {
  e.stopPropagation();
  closeMenu();
  pushToGitHub();
});

const togGithubEl = document.getElementById('togGithub');
if (togGithubEl) {
  togGithubEl.addEventListener('change', function() {
    const setup = document.getElementById('githubTokenSetup');
    const status = document.getElementById('tokenStatus');
    if (this.checked) {
      if (setup) setup.classList.add('open');
      const saved = localStorage.getItem('github-token');
      if (status) status.textContent = saved ? '✅ Token loaded from browser' : 'Paste token → press Enter';
      if (!saved) {
        const inp = document.getElementById('tokenInput');
        if (inp) inp.focus();
      }
    } else {
      if (setup) setup.classList.remove('open');
    }
  });
}

const tokenInputEl = document.getElementById('tokenInput');
if (tokenInputEl) {
  tokenInputEl.addEventListener('change', function() {
    const t = this.value.trim();
    if (t) {
      localStorage.setItem('github-token', t);
      const status = document.getElementById('tokenStatus');
      if (status) status.textContent = '✅ Saved securely in browser';
      this.value = '';
      this.blur();
    }
  });
  tokenInputEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') this.blur();
  });
}

  }catch(e){
    try{ const ls=localStorage.getItem('seeandlearn-links'); linksData=ls?JSON.parse(ls):[]; }catch(e2){ linksData=[]; }
  }
  render();
}

init();

window.addEventListener('orientationchange',()=>setTimeout(()=>{ setupLayout(); render(); },350));
